<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>
<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; color:#0f172a; }
body.dark {
  background:#0b1220;
  color:#e5e7eb;
}
body.dark .dashboard-header { background:#0f172a; }
body.dark .search-wrap,
body.dark .notif-btn,
body.dark .calendar-btn,
body.dark .message-modal,
body.dark .calendar-box,
body.dark .login-box,
body.dark .urgency-row,
body.dark .profile-dropdown,
body.dark .bell-dropdown,
body.dark .message-modal .modal-body {
  background:#0f172a;
  color:#e5e7eb;
  border-color:#1f2937;
}
body.dark .search-input { color:#e5e7eb; }
body.dark .search-icon { opacity:0.85; }
body.dark .notif-label { color:#e5e7eb; }
body.dark .bell-dropdown div:hover { background:#111827; }
body.dark .message-modal .modal-body { background:#0b1220; }
body.dark .message-card { background:#111827; border-color:#1f2937; }
body.dark .toggle-btn,
body.dark .calendar-actions button,
body.dark .profile-dropdown button,
body.dark .login-box input {
  background:#111827;
  color:#e5e7eb;
  border-color:#1f2937;
}
body.dark .profile-bubble { background:#0f8de0; }
body.dark .calendar-box { border:1px solid #ffffff; }
body.dark .calendar-grid { gap:8px; }
body.dark .calendar-day {
  background:#111827;
  border:1px solid rgba(255,255,255,0.45);
  box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset;
}
body.dark .calendar-weekday { color:#ffffff; letter-spacing:0.3px; }
body.dark .calendar-day.expanded { background:#0f172a; }
body.dark .calendar-day.pending { outline:2px solid #ffffff; }
body.dark .calendar-day strong { color:#ffffff; }
body.dark .calendar-actions button { border-color:#ffffff; }
body.dark .calendar-actions .primary { border-color:#ffffff; }
body.dark .appt-pill { background:#0b1220; border-color:#1f2937; color:#e5e7eb; }
body.dark .day-details { color:#e5e7eb; }
body.dark .dashboard-title span,
body.dark .dashboard-title div,
body.dark .dashboard-title { color:#ffffff; }
body.dark .dashboard-title [style*="color:#94a3b8"],
body.dark .dashboard-title [style*="color:#64748b"],
body.dark .dashboard-title [style*="color:#334155"],
body.dark .dashboard-title [style*="color:#0f172a"] { color:#ffffff !important; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.header-right { display:flex; align-items:center; gap:10px; }

/* ---------- SEARCH ---------- */
.search-wrap {
  display:flex;
  align-items:center;
  gap:8px;
  background:#ffffff;
  border:1px solid #e6e6e6;
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}
.search-icon { font-size:16px; opacity:0.7; }
.search-input { border:none; outline:none; background:transparent; font-size:16px; width:220px; }

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid #0070c9;
  background:#fff; color:#0070c9;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.calendar-btn:hover { background:#0070c9; color:white; }

/* ---------- NOTIFICATIONS ---------- */
.notif-wrap { position:relative; }
.notif-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:999px;
  border:1px solid #e6e6e6; background:#ffffff;
  box-shadow:0 4px 14px rgba(0,0,0,0.06); cursor:pointer;
}
.notif-icon { font-size:16px; }
.notif-label { font-size:14px; font-weight:600; color:#2b2b2b; }
.notif-badge {
  width:8px; height:8px; border-radius:50%;
  background:#ff3b30; display:none; box-shadow:0 0 0 2px #fff;
}
.bell-dropdown {
  position:absolute; top:48px; right:0;
  background:#fff; border:1px solid #e6e6e6;
  border-radius:12px; width:280px; display:none;
  flex-direction:column; box-shadow:0 10px 24px rgba(0,0,0,0.15);
  z-index:1000; font-size:14px; overflow:hidden;
}
.bell-dropdown div { padding:12px 14px; border-bottom:1px solid #f0f0f0; }
.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f7f7f7; }

/* ---------- PROFILE ---------- */
.profile-bubble {
  width:42px; height:42px; border-radius:50%;
  background:#0070c9; color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}
.profile-wrap { position:relative; }
.profile-dropdown {
  position:absolute; top:52px; right:0;
  background:#ffffff; border:1px solid #e6e6e6;
  border-radius:12px; min-width:180px;
  box-shadow:0 12px 28px rgba(15,23,42,0.18);
  padding:10px;
  display:none;
  z-index:1200;
}
.profile-dropdown button {
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.profile-dropdown button:hover {
  transform:translateY(-1px);
  border-color:#0070c9;
  box-shadow:0 8px 18px rgba(0,112,201,0.18);
}

/* ---------- STUDENT LIST ---------- */
.student-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2500;
}
.student-modal {
  width:min(760px, 92vw);
  background:#ffffff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
}
.student-modal-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.student-modal h3 { margin:0; }
.student-controls {
  display:flex;
  align-items:center;
  gap:10px;
}
.filter-btn {
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  cursor:pointer;
  font-weight:600;
}
.close-btn {
  width:34px;
  height:34px;
  border-radius:50%;
  border:1px solid #e5e7eb;
  background:#ffffff;
  cursor:pointer;
  font-size:16px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.student-list {
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.student-item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 12px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  background:#f9fafb;
}
.student-name {
  font-weight:600;
}
.student-actions {
  display:flex;
  gap:8px;
}
.student-actions button {
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  cursor:pointer;
  font-weight:600;
}
.student-actions .primary {
  border-color:#0070c9;
  background:#0070c9;
  color:#ffffff;
}
body.dark .student-modal { background:#0f172a; color:#e5e7eb; }
body.dark .student-item { background:#111827; border-color:#1f2937; }
body.dark .student-actions button { background:#111827; color:#e5e7eb; border-color:#1f2937; }
body.dark .student-actions .primary { background:#0070c9; border-color:#0070c9; color:#ffffff; }
body.dark .filter-btn,
body.dark .close-btn { background:#111827; color:#e5e7eb; border-color:#1f2937; }

/* ---------- NOTES MODAL ---------- */
.notes-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2600;
}
.notes-modal {
  width:min(680px, 92vw);
  background:#ffffff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
}
.notes-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.notes-header h3 { margin:0; }
.notes-controls{
  display:flex;
  align-items:center;
  gap:10px;
}
.download-btn{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  cursor:pointer;
  font-weight:600;
}
.notes-list {
  list-style:none;
  margin:0 0 12px 0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:240px;
  overflow:auto;
}
.note-item {
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:10px 12px;
  background:#f9fafb;
  cursor:pointer;
}
.note-item.active{
  border-color:#0070c9;
  box-shadow:0 0 0 2px rgba(0,112,201,0.15);
}
.note-meta { font-size:12px; color:#6b7280; margin-bottom:6px; }
.note-preview { font-size:14px; color:#0f172a; }
.full-note {
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:12px;
  background:#ffffff;
  margin-bottom:12px;
}
.full-note h4{
  margin:0 0 6px 0;
  font-size:14px;
}
.full-note .full-note-text{
  font-size:14px;
  white-space:pre-wrap;
}
.notes-form {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.notes-form textarea{
  width:100%;
  min-height:90px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  padding:10px;
  font-size:14px;
  resize:vertical;
}
.notes-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.notes-actions button{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  cursor:pointer;
  font-weight:600;
}
.notes-actions .primary{
  border-color:#0070c9;
  background:#0070c9;
  color:#ffffff;
}
body.dark .notes-modal { background:#0f172a; color:#e5e7eb; }
body.dark .note-item { background:#111827; border-color:#1f2937; }
body.dark .notes-form textarea { background:#111827; color:#e5e7eb; border-color:#1f2937; }
body.dark .notes-actions button { background:#111827; color:#e5e7eb; border-color:#1f2937; }
body.dark .notes-actions .primary { background:#0070c9; border-color:#0070c9; color:#ffffff; }
body.dark .download-btn { background:#111827; color:#e5e7eb; border-color:#1f2937; }
body.dark .full-note { background:#0f172a; border-color:#1f2937; }
body.dark .note-preview { color:#e5e7eb; }

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  position:relative;
  display:flex; gap:16px; margin:20px; padding:16px;
  background:#fff; border-radius:12px; border-left:6px solid;
  align-items:flex-start;
}
.urgency-dot {
  position:absolute;
  top:10px;
  right:12px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff3b30;
  box-shadow:0 0 0 2px #fff;
  display:none;
}
#red-row { border-color:red; }
#orange-row { border-color:orange; }
#yellow-row { border-color:gold; }
#green-row { border-color:green; }

.urgency-left { min-width:160px; display:flex; flex-direction:column; gap:10px; flex:0 0 180px; }
.urgency-header { display:flex; align-items:center; gap:10px; }
.messages { display:flex; flex-wrap:wrap; gap:10px; flex:1; min-width:0; }
.message-card {
  width:220px; padding:8px 10px; font-size:14px;
  background:#f9f9f9; border:1px solid #ccc; border-radius:6px; line-height:1.3;
  cursor:pointer; transition:transform 0.15s ease, box-shadow 0.2s ease;
  position:relative;
}
.message-card:hover { transform:translateY(-2px); box-shadow:0 6px 14px rgba(0,0,0,0.08); }
.message-meta { font-size:12px; color:#555; margin-top:4px; }
.message-unread {
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ff3b30;
  box-shadow:0 0 0 2px #fff;
}
body.dark .message-unread { box-shadow:0 0 0 2px #0f172a; }
.message-read {
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#3b82f6;
  box-shadow:0 0 0 2px #fff;
}
body.dark .message-read { box-shadow:0 0 0 2px #0f172a; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title" style="display:flex; align-items:center; gap:12px; font-size:20px;">
      <div style="width:34px; height:34px; border-radius:8px; background:#ffffff; border:2px solid #0070c9; display:flex; align-items:center; justify-content:center; font-weight:700; color:#0070c9;">LOGO</div>
      <div style="display:flex; flex-direction:column; line-height:1.1;">
        <div>
          <span style="font-weight:700; color:#0f172a;">TapOut!</span>
          <span style="color:#94a3b8; font-weight:600;">—</span>
          <span style="font-weight:500; color:#334155;">Counselor Dashboard</span>
        </div>
        <span style="font-size:11px; color:#64748b; margin-top:2px;">
          Your School Name Here
          <span style="margin-left:6px; color:#94a3b8;">• Current Term Here</span>
        </span>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchBar" class="search-input" placeholder="Search students..." />
      </div>
      <div style="width:34px; height:34px; border-radius:50%; background:#ffffff; border:2px solid #0070c9; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#0070c9;">SCHOOL</div>
      <button type="button" id="studentsBtn">Students</button>
      <button type="button" class="calendar-btn" onclick="openCalendarViewOnly()">📅</button>
      <div class="notif-wrap">
        <button type="button" class="notif-btn" id="notifBell">
          <span class="notif-icon">🔔</span>
          <span class="notif-label">Alerts</span>
          <span class="notif-badge" id="bellDot"></span>
        </button>
        <div class="bell-dropdown" id="bellDropdown"></div>
      </div>
      <div class="profile-wrap" id="profileWrap">
        <div class="profile-bubble" id="profileBubble"></div>
        <div class="profile-dropdown" id="profileDropdown">
          <button type="button" id="darkModeBtn">Dark Mode</button>
          <button type="button" id="weeklyAnalyticsBtn">Weekly Analytics</button>
          <button type="button" id="signOutBtn">Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <div class="urgency-row" id="red-row">
    <span class="urgency-dot" id="dot-red"></span>
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Crisis</h2>
      </div>
      <button type="button" class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <span class="urgency-dot" id="dot-orange"></span>
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Elevated Risk</h2>
      </div>
      <button type="button" class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <span class="urgency-dot" id="dot-yellow"></span>
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Moderate</h2>
      </div>
      <button type="button" class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <span class="urgency-dot" id="dot-green"></span>
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Low Urgency</h2>
      </div>
      <button type="button" class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>

<!-- STUDENT LIST MODAL -->
<div class="student-overlay" id="studentOverlay">
  <div class="student-modal">
    <div class="student-modal-header">
      <h3>Students (A–Z)</h3>
      <div class="student-controls">
        <button type="button" id="gradeFilterBtn" class="filter-btn" onclick="cycleGradeFilter()">Grade: All</button>
        <button type="button" class="close-btn" onclick="closeStudentList()">✕</button>
      </div>
    </div>
    <ul class="student-list" id="studentList"></ul>
  </div>
</div>

<!-- NOTES MODAL -->
<div class="notes-overlay" id="notesOverlay">
  <div class="notes-modal">
    <div class="notes-header">
      <h3 id="notesTitle">Notes</h3>
      <div class="notes-controls">
        <button type="button" class="download-btn" id="downloadNoteBtn" onclick="downloadSelectedNotePdf()">Download PDF</button>
        <button type="button" class="close-btn" onclick="closeNotesModal()">✕</button>
      </div>
    </div>
    <ul class="notes-list" id="notesList"></ul>
    <div class="full-note" id="fullNoteView">
      <h4 id="fullNoteTitle">Select a note</h4>
      <div class="full-note-text" id="fullNoteText">Click a note above to view the full text.</div>
    </div>
    <div class="notes-form">
      <textarea id="newNoteText" placeholder="Write a new note..."></textarea>
      <div class="notes-actions">
        <button type="button" onclick="closeNotesModal()">Cancel</button>
        <button type="button" class="primary" onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>
</div>

<!-- MESSAGE MODAL -->
<div class="message-overlay" id="messageOverlay">
  <div class="message-modal">
    <h3 id="modalTitle">Message</h3>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button type="button" onclick="closeMessage()">Back</button>
      <button type="button" class="primary" onclick="goToCalendarSchedule()">Continue</button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box" id="calendarBox">
    <span class="close-calendar" onclick="closeCalendar()">✖</span>
    <div class="calendar-header">
      <button type="button" class="month-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="monthLabel"></h3>
      <button type="button" class="month-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="calendar-actions">
      <button type="button" onclick="closeCalendar()">Back</button>
      <button type="button" class="edit" id="editBtn" style="display:none;">Edit</button>
      <button type="button" class="primary" id="continueBtn" onclick="confirmAppointment()" style="display:none;">Continue</button>
    </div>
  </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const profileBubble = document.getElementById("profileBubble");
const searchBar = document.getElementById("searchBar");
const bellDot = document.getElementById("bellDot");
const bellDropdown = document.getElementById("bellDropdown");
const notifBell = document.getElementById("notifBell");
const profileWrap = document.getElementById("profileWrap");
const profileDropdown = document.getElementById("profileDropdown");
const darkModeBtn = document.getElementById("darkModeBtn");
const weeklyAnalyticsBtn = document.getElementById("weeklyAnalyticsBtn");
const signOutBtn = document.getElementById("signOutBtn");
const calendarOverlay = document.getElementById("calendarOverlay");
const calendarBox = document.getElementById("calendarBox");
const calendarGrid = document.getElementById("calendarGrid");
const monthLabel = document.getElementById("monthLabel");
const messageOverlay = document.getElementById("messageOverlay");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const modalMeta = document.getElementById("modalMeta");
const editBtn = document.getElementById("editBtn");
const continueBtn = document.getElementById("continueBtn");
const username = document.getElementById("username");
const password = document.getElementById("password");
const studentsBtn = document.getElementById("studentsBtn");
const studentOverlay = document.getElementById("studentOverlay");
const studentList = document.getElementById("studentList");
const gradeFilterBtn = document.getElementById("gradeFilterBtn");
const notesOverlay = document.getElementById("notesOverlay");
const notesList = document.getElementById("notesList");
const notesTitle = document.getElementById("notesTitle");
const newNoteText = document.getElementById("newNoteText");
const downloadNoteBtn = document.getElementById("downloadNoteBtn");
const fullNoteTitle = document.getElementById("fullNoteTitle");

loginForm.onsubmit = async e => {
  e.preventDefault();
  const usernameVal = username.value;
  const passwordVal = password.value;
  try {
    const res = await sisLogin(usernameVal, passwordVal);
    if(res.success){
      localStorage.setItem("loggedInCounselor", res.counselorId);
      showDashboard();
    } else alert("Invalid login");
  } catch(err){
    console.error(err);
    alert("Login failed");
  }
};

async function sisLogin(usernameVal, passwordVal){
  if(counselors[usernameVal] && counselors[usernameVal] === passwordVal){
    return {success:true, counselorId:usernameVal};
  }
  return {success:false};
}

function renderStudentList(){
  if(!studentList) return;
  const sorted = exampleStudents.slice().sort((a,b)=>{
    const last = a.lastName.localeCompare(b.lastName);
    if(last !== 0) return last;
    return a.firstName.localeCompare(b.firstName);
  });
  const filtered = currentGradeFilter === "All" ? sorted : sorted.filter(s => s.grade === currentGradeFilter);
  studentList.innerHTML = "";
  filtered.forEach((s)=>{
    const li = document.createElement("li");
    li.className = "student-item";

    const name = document.createElement("div");
    name.className = "student-name";
    name.textContent = `${s.lastName}, ${s.firstName} (Grade ${s.grade})`;

    const actions = document.createElement("div");
    actions.className = "student-actions";

    const notesBtn = document.createElement("button");
    notesBtn.type = "button";
    notesBtn.textContent = "Notes";
    notesBtn.onclick = () => openNotesModal(s);

    const historyBtn = document.createElement("button");
    historyBtn.type = "button";
    historyBtn.className = "primary";
    historyBtn.textContent = "Appointments";
    historyBtn.onclick = () => alert(`Appointment history for ${s.firstName} ${s.lastName}`);

    actions.appendChild(notesBtn);
    actions.appendChild(historyBtn);
    li.appendChild(name);
    li.appendChild(actions);
    studentList.appendChild(li);
  });
}

function getStudentKey(student){
  return `${student.lastName.toLowerCase()}-${student.firstName.toLowerCase()}-${student.grade}`;
}

function openNotesModal(student){
  if(!notesOverlay || !notesList || !notesTitle) return;
  currentNotesStudentKey = getStudentKey(student);
  currentNotesStudentName = `${student.firstName} ${student.lastName}`;
  notesTitle.textContent = `Notes — ${currentNotesStudentName}`;
  selectedNoteIndex = null;
  selectedNoteData = null;
  if(fullNoteTitle) fullNoteTitle.textContent = "Select a note";
  if(fullNoteText) fullNoteText.textContent = "Click a note above to view the full text.";
  renderNotesList();
  notesOverlay.style.display = "flex";
}

function loadNotesForStudent(){
  if(!currentNotesStudentKey) return [];
  const allNotes = JSON.parse(localStorage.getItem("studentNotes") || "{}");
  return allNotes[currentNotesStudentKey] || [];
}

function saveNotesForStudent(notes){
  if(!currentNotesStudentKey) return;
  const allNotes = JSON.parse(localStorage.getItem("studentNotes") || "{}");
  allNotes[currentNotesStudentKey] = notes;
  localStorage.setItem("studentNotes", JSON.stringify(allNotes));
}

function renderNotesList(){
  if(!notesList) return;
  const notes = loadNotesForStudent();
  notesList.innerHTML = "";
  if(notes.length === 0){
    const empty = document.createElement("li");
    empty.className = "note-item";
    empty.innerHTML = `<div class="note-text">No notes yet.</div>`;
    notesList.appendChild(empty);
    return;
  }
  notes.forEach((n, idx)=>{
    const li = document.createElement("li");
    li.className = "note-item";
    const meta = document.createElement("div");
    meta.className = "note-meta";
    meta.textContent = n.date;
    const preview = document.createElement("div");
    preview.className = "note-preview";
    preview.textContent = truncateWords(n.text, 18);
    li.appendChild(meta);
    li.appendChild(preview);
    li.onclick = () => selectNote(idx, n);
    if(selectedNoteIndex === idx) li.classList.add("active");
    notesList.appendChild(li);
  });
}

function saveNote(){
  if(!newNoteText) return;
  const text = newNoteText.value.trim();
  if(!text) { alert("Please enter a note."); return; }
  const notes = loadNotesForStudent();
  notes.unshift({
    text,
    date: new Date().toLocaleString()
  });
  saveNotesForStudent(notes);
  newNoteText.value = "";
  renderNotesList();
}

function truncateWords(text, maxWords){
  if(!text) return "";
  const words = text.trim().split(/\s+/);
  if(words.length <= maxWords) return text;
  return words.slice(0, maxWords).join(" ") + "…";
}

function selectNote(idx, note){
  selectedNoteIndex = idx;
  selectedNoteData = note;
  if(fullNoteTitle) fullNoteTitle.textContent = `Full Note — ${note.date}`;
  if(fullNoteText) fullNoteText.textContent = note.text;
  renderNotesList();
}

function escapePdfText(text){
  return text.replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
}

function buildSimplePdf(text, title){
  const pageHeight = 792;
  const margin = 72;
  const lineHeight = 14;
  const maxLineWidth = 86;
  const words = (title + "\n\n" + text).split(/\s+/);
  const lines = [];
  let line = "";
  words.forEach(w=>{
    const test = line ? line + " " + w : w;
    if(test.length > maxLineWidth){
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);

  let y = pageHeight - margin;
  let content = "BT\n/F1 12 Tf\n";
  lines.forEach((ln)=>{
    if(y < margin) return;
    content += `1 0 0 1 ${margin} ${y} Tm (${escapePdfText(ln)}) Tj\n`;
    y -= lineHeight;
  });
  content += "ET\n";

  const objects = [];
  objects.push("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
  objects.push("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");
  objects.push("3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>\nendobj\n");
  objects.push(`4 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`);
  objects.push("5 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n");

  let pdf = "%PDF-1.3\n";
  const xref = [];
  let offset = pdf.length;
  objects.forEach(obj=>{
    xref.push(offset);
    pdf += obj;
    offset = pdf.length;
  });
  const xrefStart = pdf.length;
  pdf += "xref\n0 6\n0000000000 65535 f \n";
  xref.forEach(off=>{
    pdf += String(off).padStart(10,"0") + " 00000 n \n";
  });
  pdf += "trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n" + xrefStart + "\n%%EOF";
  return pdf;
}

function downloadSelectedNotePdf(){
  if(!selectedNoteData || !currentNotesStudentName){
    alert("Select a note first.");
    return;
  }
  const title = `${currentNotesStudentName} — ${selectedNoteData.date}`;
  const pdf = buildSimplePdf(selectedNoteData.text, title);
  const blob = new Blob([pdf], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const safeName = currentNotesStudentName.replace(/\s+/g, "_");
  a.download = `${safeName}_note.pdf`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function cycleGradeFilter(){
  const idx = gradeFilters.indexOf(currentGradeFilter);
  const next = gradeFilters[(idx + 1) % gradeFilters.length];
  currentGradeFilter = next;
  if(gradeFilterBtn) gradeFilterBtn.textContent = `Grade: ${currentGradeFilter}`;
  renderStudentList();
}
