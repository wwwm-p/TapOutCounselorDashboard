<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapOut – Counselor Dashboard</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f6f2;
  color: #222;
}

/* LOGIN */
.login-wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 35px;
  width: 360px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.login-box h2 {
  margin-top: 0;
  text-align: center;
}

.login-box label {
  font-weight: bold;
  margin-top: 15px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 15px;
}

.login-box button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #0070c9;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

/* DASHBOARD HEADER */
.dashboard-header {
  background: #ffffff;
  padding: 14px 24px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-title {
  font-size: 20px;
  font-weight: bold;
}

.dashboard-header span {
  font-size: 13px;
  opacity: 0.7;
}

.dashboard-header button {
  padding: 8px 14px;
  cursor: pointer;
}

/* URGENCY ROWS */
.urgency-row {
  margin: 18px;
  padding: 14px;
  background: white;
  border-radius: 14px;
  border-left: 6px solid;
}

#red-row { border-color: #e74c3c; }
#orange-row { border-color: #e67e22; }
#yellow-row { border-color: #f1c40f; }
#green-row { border-color: #2ecc71; }

.urgency-header {
  display: flex;
  align-items: center;
  gap: 12px;
}

.urgency-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toggle-btn {
  margin-top: 6px;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: none;
  cursor: pointer;
}

/* MESSAGES */
.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.message-card {
  background: #f3f3f3;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  width: fit-content;
  max-width: 240px;
}

/* FACES */
.face {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  position: relative;
}

.eye {
  width: 4px;
  height: 4px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 11px;
}

.eye.left { left: 9px; }
.eye.right { right: 9px; }

.mouth {
  position: absolute;
  left: 50%;
  bottom: 7px;
  transform: translateX(-50%);
  width: 14px;
  height: 8px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
}

.sad .mouth { transform: translateX(-50%) rotate(180deg); }
.neutral .mouth { border: none; height: 3px; background: black; }

.red-face { background: #e74c3c; }
.orange-face { background: #e67e22; }
.yellow-face { background: #f1c40f; }
.green-face { background: #2ecc71; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form class="login-box" id="loginForm">
    <h2>TapOut Login</h2>

    <label>Username</label>
    <input id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">

<header class="dashboard-header">
  <div>
    <div class="dashboard-title">TapOut – Counselor Dashboard</div>
    <span id="signedIn"></span>
  </div>
  <button onclick="logout()">Sign Out</button>
</header>

<div id="red-row" class="urgency-row">
  <div class="urgency-header">
    <div class="urgency-info">
      <div class="face red-face sad">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>High Urgency</strong>
    </div>
  </div>
  <button class="toggle-btn" onclick="toggle(this)">Hide Messages</button>
  <div class="messages"></div>
</div>

<div id="orange-row" class="urgency-row">
  <div class="urgency-header">
    <div class="urgency-info">
      <div class="face orange-face sad">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Medium-High</strong>
    </div>
  </div>
  <button class="toggle-btn" onclick="toggle(this)">Hide Messages</button>
  <div class="messages"></div>
</div>

<div id="yellow-row" class="urgency-row">
  <div class="urgency-header">
    <div class="urgency-info">
      <div class="face yellow-face neutral">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Medium-Low</strong>
    </div>
  </div>
  <button class="toggle-btn" onclick="toggle(this)">Hide Messages</button>
  <div class="messages"></div>
</div>

<div id="green-row" class="urgency-row">
  <div class="urgency-header">
    <div class="urgency-info">
      <div class="face green-face">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Low Urgency</strong>
    </div>
  </div>
  <button class="toggle-btn" onclick="toggle(this)">Hide Messages</button>
  <div class="messages"></div>
</div>

</div>

<script>
const counselors = {
  miap2k10: "1234",
  kmcconnell: "1234",
  gsorbi: "1234",
  apanlilio: "1234",
  aturner: "1234",
  cfilson: "1234"
};

document.getElementById("loginForm").onsubmit = e => {
  e.preventDefault();
  const u = username.value.trim();
  const p = password.value.trim();
  if (counselors[u] === p) {
    localStorage.setItem("loggedInCounselor", u);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";
  signedIn.textContent = "Signed in as: " + localStorage.getItem("loggedInCounselor");
  loadMessages();
}

function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

function toggle(btn) {
  const box = btn.nextElementSibling;
  const hidden = box.style.display === "none";
  box.style.display = hidden ? "flex" : "none";
  btn.textContent = hidden ? "Hide Messages" : "Show Messages";
}

function loadMessages() {
  const counselor = localStorage.getItem("loggedInCounselor");
  const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");

  document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");

  const map = {
    "I’m in Crisis": "red-row",
    "I’m Not Coping Well": "orange-row",
    "Feeling a Little Off": "yellow-row",
    "I’m Doing Fine – Just Curious": "green-row"
  };

  messages.forEach(m => {
    if (m.counselor !== counselor) return;
    const card = document.createElement("div");
    card.className = "message-card";
    card.innerHTML = `<strong>${m.name}</strong> (${m.grade})<br>${m.reason}`;
    document.querySelector(`#${map[m.urgency]} .messages`).appendChild(card);
  });
}

if (localStorage.getItem("loggedInCounselor")) showDashboard();
</script>

</body>
</html>
