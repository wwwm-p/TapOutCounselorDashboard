<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>
<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; color:#0f172a; }
body.dark { background:#0b1220; color:#e5e7eb; }
body.dark .dashboard-header { background:#0f172a; }
body.dark .search-wrap, body.dark .notif-btn, body.dark .urgency-row,
body.dark .profile-dropdown, body.dark .bell-dropdown { background:#0f172a; color:#e5e7eb; border-color:#1f2937; }
body.dark .profile-bubble { background:#0f8de0; }
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.header-right { display:flex; align-items:center; gap:10px; }
.search-wrap { display:flex; align-items:center; gap:8px; background:#ffffff; border:1px solid #e6e6e6; border-radius:999px; padding:8px 14px; box-shadow:0 4px 14px rgba(0,0,0,0.06); }
.search-input { border:none; outline:none; background:transparent; font-size:16px; width:220px; }
.calendar-btn { width:42px; height:42px; border-radius:50%; border:2px solid #0070c9; background:#fff; color:#0070c9; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.notif-wrap { position:relative; }
.notif-btn { display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; border:1px solid #e6e6e6; background:#ffffff; box-shadow:0 4px 14px rgba(0,0,0,0.06); cursor:pointer; }
.notif-badge { width:8px; height:8px; border-radius:50%; background:#ff3b30; display:none; box-shadow:0 0 0 2px #fff; }
.bell-dropdown { position:absolute; top:48px; right:0; background:#fff; border:1px solid #e6e6e6; border-radius:12px; width:280px; display:none; flex-direction:column; box-shadow:0 10px 24px rgba(0,0,0,0.15); z-index:1000; font-size:14px; overflow:hidden; }
.bell-dropdown div { padding:12px 14px; border-bottom:1px solid #f0f0f0; }
.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f7f7f7; }
.profile-bubble { width:42px; height:42px; border-radius:50%; background:#0070c9; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }
.profile-dropdown { position:absolute; top:52px; right:0; background:#ffffff; border:1px solid #e6e6e6; border-radius:12px; min-width:180px; box-shadow:0 12px 28px rgba(15,23,42,0.18); padding:10px; display:none; z-index:1200; }
.profile-dropdown button { width:100%; padding:10px 14px; border-radius:10px; border:1px solid #e5e7eb; background:#ffffff; font-weight:600; cursor:pointer; transition:transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
.profile-dropdown button:hover { transform:translateY(-1px); border-color:#0070c9; box-shadow:0 8px 18px rgba(0,112,201,0.18); }
.urgency-row { position:relative; display:flex; gap:16px; margin:20px; padding:16px; background:#fff; border-radius:12px; border-left:6px solid; align-items:flex-start; }
#red-row { border-color:red; } #orange-row { border-color:orange; } #yellow-row { border-color:gold; } #green-row { border-color:green; }
.urgency-left { min-width:160px; display:flex; flex-direction:column; gap:10px; flex:0 0 180px; }
.urgency-header { display:flex; align-items:center; gap:10px; }
.messages { display:flex; flex-wrap:wrap; gap:10px; flex:1; min-width:0; }
.message-card { width:220px; padding:8px 10px; font-size:14px; background:#f9f9f9; border:1px solid #ccc; border-radius:6px; line-height:1.3; cursor:pointer; transition:transform 0.15s ease, box-shadow 0.2s ease; position:relative; }
.message-card:hover { transform:translateY(-2px); box-shadow:0 6px 14px rgba(0,0,0,0.08); }
.face { width:44px; height:44px; border-radius:50%; position:relative; flex:0 0 44px; }
.eye { width:6px; height:8px; background:#3b3b3b; border-radius:50%; position:absolute; top:15px; }
.eye.left { left:13px; }
.eye.right { right:13px; }
.mouth { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:22px; height:12px; border:4px solid #3b3b3b; border-color:#3b3b3b transparent transparent transparent; border-radius:50%; }
.sad .mouth { transform:translateX(-50%) rotate(180deg); }
.neutral .mouth { border:none; width:24px; height:4px; background:#3b3b3b; border-radius:6px; }
.red-face { background:#ff5a4e; } .orange-face { background:#ffb02e; } .yellow-face { background:#ffe31a; } .green-face { background:#a9cf4f; }
.toggle-btn { padding:8px 18px; border-radius:999px; border:1px solid #e6e6e6; background:#ffffff; cursor:pointer; font-weight:600; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required />
    <label>Password</label>
    <input id="password" type="password" required />
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title" style="display:flex; align-items:center; gap:12px; font-size:20px;">
      <div style="width:34px; height:34px; border-radius:8px; background:#ffffff; border:2px solid #0070c9; display:flex; align-items:center; justify-content:center; font-weight:700; color:#0070c9;">LOGO</div>
      <div style="display:flex; flex-direction:column; line-height:1.1;">
        <div>
          <span style="font-weight:700; color:#0f172a;">TapOut!</span>
          <span style="color:#94a3b8; font-weight:600;">—</span>
          <span style="font-weight:500; color:#334155;">Counselor Dashboard</span>
        </div>
        <span style="font-size:11px; color:#64748b; margin-top:2px;">
          Your School Name Here
          <span style="margin-left:6px; color:#94a3b8;">• Current Term Here</span>
        </span>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <span>🔍</span>
        <input id="searchBar" class="search-input" placeholder="Search students..." />
      </div>
      <div class="notif-wrap">
        <button class="notif-btn" id="notifBell">🔔<span class="notif-badge" id="bellDot"></span></button>
        <div class="bell-dropdown" id="bellDropdown"><div>No notifications</div></div>
      </div>
      <div class="profile-wrap">
        <div class="profile-bubble" id="profileBubble">AB</div>
        <div class="profile-dropdown" id="profileDropdown">
          <button id="darkModeBtn">Toggle Dark Mode</button>
          <button id="signOutBtn">Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Urgency rows -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Crisis</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Elevated Risk</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Moderate</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Low Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>

<script>
// Login & Dashboard
function toggleMessages(rowId){
  const row=document.getElementById(rowId);
  const msgs=row.querySelector('.messages');
  const btn=row.querySelector('.toggle-btn');
  if(!msgs.style.display || msgs.style.display==='flex'){
    msgs.style.display='none';
    btn.textContent='Show Messages';
  } else {
    msgs.style.display='flex';
    btn.textContent='Hide Messages';
  }
}
document.getElementById('profileBubble').addEventListener('click', ()=>{
  const dropdown=document.getElementById('profileDropdown');
  dropdown.style.display=dropdown.style.display==='block'?'none':'block';
});
document.getElementById('darkModeBtn').addEventListener('click',()=>document.body.classList.toggle('dark'));
document.getElementById('signOutBtn').addEventListener('click',()=>logout());
</script>

<script src="counselorDashboard.js"></script>
</body>
</html>
