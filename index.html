<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapOut – Counselor Dashboard</title>

<style>
:root {
  --bg: #fffcf5;
  --card: #ffffff;
  --text: #000;
  --header: #87CEFA;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2a2a2a;
  --text: #fff;
  --header: #333;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--header);
  padding: 12px 20px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dashboard-title {
  font-size: 20px;
  font-weight: bold;
}

.signed-in {
  font-size: 13px;
  opacity: 0.8;
}

.header-right {
  display: flex;
  gap: 8px;
}

.header-right input {
  padding: 6px;
}

.header-right button {
  padding: 6px 10px;
  cursor: pointer;
}

/* LOGIN */
#loginScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
  width: 260px;
}

.login-box input,
.login-box button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
}

/* URGENCY ROWS */
.urgency-row {
  background: var(--card);
  margin: 12px;
  padding: 10px;
  border-radius: 10px;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.urgency-header {
  display: flex;
  align-items: center;
}

.urgency-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.urgency-left button {
  margin-left: 10px;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  cursor: pointer;
}

/* MESSAGES */
.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.message-card {
  background: var(--bg);
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 12px;
  width: 210px;
}

/* FACES */
.face {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  position: relative;
}

.eye {
  width: 5px;
  height: 5px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 11px;
}

.eye.left { left: 10px; }
.eye.right { right: 10px; }

.mouth {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 16px;
  height: 8px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
}

.sad .mouth {
  transform: translateX(-50%) rotate(180deg);
}

.neutral .mouth {
  border: none;
  height: 3px;
  background: black;
}

.red-face { background: red; }
.orange-face { background: orange; }
.yellow-face { background: gold; }
.green-face { background: green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>TapOut Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none">

<header class="dashboard-header">
  <div class="header-left">
    <div>
      <div class="dashboard-title">TapOut – Counselor Dashboard</div>
      <div class="signed-in">Signed in as: <span id="counselorName"></span></div>
    </div>
  </div>

  <div class="header-right">
    <input id="searchBar" placeholder="Search students">
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Sign Out</button>
  </div>
</header>

<div id="dashboard">

<!-- RED -->
<div class="urgency-row" id="red-row">
  <div class="urgency-header">
    <div class="urgency-left">
      <div class="face red-face sad">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>High Urgency</strong>
      <button onclick="toggleMessages('red-row', this)">Hide Messages</button>
    </div>
  </div>
  <div class="messages"></div>
</div>

<!-- ORANGE -->
<div class="urgency-row" id="orange-row">
  <div class="urgency-header">
    <div class="urgency-left">
      <div class="face orange-face sad">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Medium-High</strong>
      <button onclick="toggleMessages('orange-row', this)">Hide Messages</button>
    </div>
  </div>
  <div class="messages"></div>
</div>

<!-- YELLOW -->
<div class="urgency-row" id="yellow-row">
  <div class="urgency-header">
    <div class="urgency-left">
      <div class="face yellow-face neutral">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Medium-Low</strong>
      <button onclick="toggleMessages('yellow-row', this)">Hide Messages</button>
    </div>
  </div>
  <div class="messages"></div>
</div>

<!-- GREEN -->
<div class="urgency-row" id="green-row">
  <div class="urgency-header">
    <div class="urgency-left">
      <div class="face green-face">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
      </div>
      <strong>Low Urgency</strong>
      <button onclick="toggleMessages('green-row', this)">Hide Messages</button>
    </div>
  </div>
  <div class="messages"></div>
</div>

</div>
</div>

<script>
/* TEST COUNSELOR ACCOUNTS */
const counselors = {
  miap2k10: "1234",
  kmcconnell: "1234",
  gsorbi: "1234",
  apanlilio: "1234",
  aturner: "1234",
  cfilson: "1234"
};

function login() {
  const u = username.value.trim();
  const p = password.value.trim();
  if (counselors[u] === p) {
    localStorage.setItem("loggedInCounselor", u);
    showDashboard();
  } else {
    alert("Invalid login");
  }
}

function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";
  counselorName.textContent = localStorage.getItem("loggedInCounselor");
  loadMessages();
}

function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

function loadMessages() {
  document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");
  const counselor = localStorage.getItem("loggedInCounselor");
  const msgs = JSON.parse(localStorage.getItem("studentMessages") || "[]");

  const map = {
    "I’m in Crisis": "red-row",
    "I’m Not Coping Well": "orange-row",
    "Feeling a Little Off": "yellow-row",
    "I’m Doing Fine – Just Curious": "green-row"
  };

  msgs.forEach(m => {
    if (m.counselor !== counselor) return;
    const row = document.querySelector(`#${map[m.urgency]} .messages`);
    const card = document.createElement("div");
    card.className = "message-card";
    card.innerHTML = `
      <strong>${m.firstName} ${m.lastName}</strong><br>
      Grade ${m.grade}<br>
      ${m.reason}<br>
      <em>${m.time}</em>
    `;
    row.appendChild(card);
  });
}

function toggleMessages(id, btn) {
  const box = document.querySelector(`#${id} .messages`);
  const hide = box.style.display !== "none";
  box.style.display = hide ? "none" : "flex";
  btn.textContent = hide ? "Show Messages" : "Hide Messages";
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

searchBar.addEventListener("input", () => {
  const q = searchBar.value.toLowerCase();
  document.querySelectorAll(".message-card").forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(q) ? "block" : "none";
  });
});

window.onload = () => {
  if (localStorage.getItem("loggedInCounselor")) showDashboard();
};
</script>

</body>
</html>
