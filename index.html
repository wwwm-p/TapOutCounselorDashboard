<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TapOut! - Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="main-header">
    <h1>TapOut! - Student Dashboard</h1>

    <input 
        type="text" 
        id="studentSearchHeader" 
        placeholder="Search students..."
    >

    <div class="header-actions">
        <button class="btn" onclick="openCalendar()">Open Calendar</button>
        <button class="btn" onclick="toggleStudentsPanel()">Students</button>
        <button class="btn" onclick="toggleNotesPanel()">Notes</button>
        <button class="btn">Sign In</button>
    </div>
</header>

<!-- STUDENTS PANEL -->
<div id="studentsPanel" class="panel hidden">
    <h2>Assigned Students</h2>

    <div class="panel-controls">
        <label>Sort:</label>
        <select id="sortOption" onchange="renderStudentList()">
            <option value="alpha">Alphabetical</option>
            <option value="grade">Grade Level</option>
        </select>
    </div>

    <ul id="studentList"></ul>
</div>

<!-- STUDENT DETAIL PANEL -->
<div id="studentDetailPanel" class="panel hidden center-panel">
    <button class="btn small" onclick="closeStudentDetail()">Back</button>

    <h2 id="studentName"></h2>
    <p id="studentEmail"></p>

    <h3>Appointment History</h3>
    <ul>
        <li>No appointments recorded.</li>
    </ul>
</div>

<!-- NOTES PANEL -->
<div id="notesPanel" class="panel hidden">
    <h2>Notes</h2>

    <textarea id="newNote" placeholder="Write a note..."></textarea>
    <button class="btn" onclick="saveNote()">Save Note</button>

    <h3>Saved Notes</h3>
    <ul id="notesHistory"></ul>
</div>

<!-- DASHBOARD -->
<main class="dashboard">

    <div class="urgency-row">
        <div class="face red-face">
            <div class="eyes"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="urgency-row">
        <div class="face orange-face">
            <div class="eyes"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="urgency-row">
        <div class="face yellow-face">
            <div class="eyes"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="urgency-row">
        <div class="face green-face">
            <div class="eyes"></div>
            <div class="mouth"></div>
        </div>
    </div>

</main>

<script src="app.js"></script>
</body>
</html>
