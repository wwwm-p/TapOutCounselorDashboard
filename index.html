<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TapOut! – Counselor Dashboard</title>

<link rel="manifest" href="/counselor-manifest.json">
<meta name="theme-color" content="#0070c9">

<link rel="icon" href="/icons/icon-192-counselor.png">
<link rel="apple-touch-icon" href="/icons/icon-192-counselor.png">

<style>
:root{
  --bg:#f7f6f2; --surface:#ffffff; --text:#0f172a;
  --border:#e5e7eb; --accent:#0070c9;
}
body{ margin:0; font-family:sans-serif; background:var(--bg); }

/* Layout */
.app{ display:grid; grid-template-columns:250px 1fr; height:100vh; }
.sidebar{ background:#fff; padding:20px; border-right:1px solid var(--border); }
.main{ display:flex; flex-direction:column; }

.header{ background:#87CEFA; padding:16px; display:flex; justify-content:space-between; }
.content{ padding:20px; }

button{ padding:8px 14px; border:none; border-radius:8px; background:var(--accent); color:#fff; cursor:pointer; }

/* Login */
.login-screen{ display:flex; align-items:center; justify-content:center; height:100vh; }
.login-box{ background:#fff; padding:20px; border-radius:10px; width:300px; }
.login-box input{ width:100%; margin:5px 0; padding:8px; }

/* Install button */
#installBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  display:none;
}
</style>
</head>

<body>

<button id="installBtn">Install App</button>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-box">
    <h2>Counselor Login</h2>
    <input id="loginEmail" placeholder="Email" required />
    <input id="loginPassword" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">

  <div class="sidebar">
    <h3>Dashboard</h3>
    <button onclick="showView('home')">Home</button>
    <button onclick="showView('students')">Students</button>
  </div>

  <div class="main">
    <div class="header">
      <div id="schoolName">School</div>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="content">

      <div id="homeView">
        <h2>Welcome</h2>
      </div>

      <div id="studentsView" style="display:none;">
        <h2>Students</h2>
        <div id="studentList"></div>
      </div>

    </div>
  </div>
</div>

<script>

/* ================= DATA ================= */
const mockData = {
  counselors:[{id:"c1",email:"alice@school.edu",password:"123"}],
  students:[{name:"Maya Foster",grade:10}]
};

let currentCounselor = null;

/* ================= LOGIN ================= */
loginForm.onsubmit = (e)=>{
  e.preventDefault();

  const email = loginEmail.value;
  const password = loginPassword.value;

  const user = mockData.counselors.find(c=>c.email===email && c.password===password);

  if(!user){
    alert("Invalid login");
    return;
  }

  localStorage.setItem("user", user.id);
  currentCounselor = user;
  openApp();
};

function openApp(){
  loginScreen.style.display="none";
  app.style.display="grid";
  renderStudents();
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= STUDENTS ================= */
function renderStudents(){
  studentList.innerHTML = "";
  mockData.students.forEach(s=>{
    const div = document.createElement("div");
    div.textContent = s.name + " (Grade " + s.grade + ")";
    studentList.appendChild(div);
  });
}

/* ================= NAV ================= */
function showView(view){
  homeView.style.display="none";
  studentsView.style.display="none";

  if(view==="home") homeView.style.display="block";
  if(view==="students") studentsView.style.display="block";
}

/* ================= INSTALL ================= */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
  console.log("INSTALL READY");
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.onclick = async ()=>{
  if(!deferredPrompt){
    alert("Install not ready");
    return;
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  installBtn.style.display = "none";
};

/* ================= SERVICE WORKER ================= */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("/service-worker.js");
  });
}

/* ================= AUTO LOGIN ================= */
if(localStorage.getItem("user")){
  openApp();
}

</script>
</body>
</html>
