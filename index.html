<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.dashboard-title { font-size:22px; font-weight:bold; }
.header-right { display:flex; align-items:center; gap:10px; }
.header-right input { width:260px; padding:10px; font-size:16px; }

/* ---------- BUTTONS ---------- */
.icon-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid #0070c9;
  background:#fff; color:#0070c9;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.icon-btn:hover { background:#0070c9; color:white; }

.bell-dot {
  position:absolute; top:4px; right:4px;
  width:10px; height:10px;
  background:red; border-radius:50%;
  display:none;
}

.bell-dropdown {
  position:absolute; top:48px; right:0;
  background:#fff; border:1px solid #ccc;
  border-radius:10px; width:260px;
  display:none; flex-direction:column;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
  z-index:1000; font-size:14px;
}

.bell-dropdown div { padding:10px; border-bottom:1px solid #eee; }
.bell-dropdown div:last-child { border-bottom:none; }

/* ---------- PROFILE ---------- */
.profile-bubble {
  width:42px; height:42px; border-radius:50%;
  background:#0070c9; color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}

/* ---------- CALENDAR ---------- */
.calendar-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.calendar-box {
  background:white;
  padding:20px;
  width:420px;
  border-radius:14px;
  position:relative;
}

.close-calendar {
  position:absolute;
  top:8px;
  right:12px;
  font-size:18px;
  cursor:pointer;
}

.calendar-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.calendar-day {
  background:#f1f1f1;
  border-radius:6px;
  padding:6px;
  font-size:13px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
<header class="dashboard-header">
  <div class="dashboard-title">TapOut – Counselor Dashboard</div>
  <div class="header-right">

    <input id="searchBar" placeholder="Search students...">

    <!-- CALENDAR BUTTON -->
    <button class="icon-btn" id="calendarBtn">📅</button>

    <!-- NOTIFICATION BUTTON -->
    <div style="position:relative;">
      <button class="icon-btn" id="notifBell">
        🔔<span class="bell-dot" id="bellDot"></span>
      </button>
      <div class="bell-dropdown" id="bellDropdown"></div>
    </div>

    <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
  </div>
</header>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box">
    <span class="close-calendar" id="closeCalendar">✖</span>
    <h3 id="monthLabel"></h3>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
/* ---------- LOGIN ---------- */
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const profileBubble = document.getElementById("profileBubble");

const counselors = { admin:"1234" };

loginForm.onsubmit = e => {
  e.preventDefault();
  if(counselors[username.value] === password.value){
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent = "AD";
  renderCalendar();
}

/* ---------- CALENDAR (ISOLATED) ---------- */
const calendarOverlay = document.getElementById("calendarOverlay");
const calendarBtn = document.getElementById("calendarBtn");
const closeCalendarBtn = document.getElementById("closeCalendar");
const calendarGrid = document.getElementById("calendarGrid");
const monthLabel = document.getElementById("monthLabel");

calendarBtn.onclick = e => {
  e.stopPropagation();
  calendarOverlay.style.display = "flex";
};

closeCalendarBtn.onclick = () => {
  calendarOverlay.style.display = "none";
};

calendarOverlay.onclick = e => {
  if(e.target === calendarOverlay){
    calendarOverlay.style.display = "none";
  }
};

function renderCalendar(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  calendarGrid.innerHTML="";
  monthLabel.textContent = now.toLocaleString("default",{month:"long",year:"numeric"});
  for(let d=1; d<=new Date(y,m+1,0).getDate(); d++){
    const div = document.createElement("div");
    div.className="calendar-day";
    div.textContent=d;
    calendarGrid.appendChild(div);
  }
}

/* ---------- NOTIFICATIONS (FIXED) ---------- */
const notifBell = document.getElementById("notifBell");
const bellDropdown = document.getElementById("bellDropdown");
const bellDot = document.getElementById("bellDot");

notifBell.onclick = e => {
  e.stopPropagation();
  bellDropdown.style.display =
    bellDropdown.style.display === "flex" ? "none" : "flex";
};

document.addEventListener("click", () => {
  bellDropdown.style.display = "none";
});

/* ---------- INIT ---------- */
if(localStorage.getItem("loggedInCounselor")) showDashboard();
</script>

</body>
</html>
