<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Login & Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fffcf5;
      text-align: center;
    }

    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
      text-align: left;
    }

    .login-box label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
      font-size: 18px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      float: right;
      padding: 10px 25px;
      font-size: 16px;
      background: #0070c9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #dashboardScreen {
      display: none;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #87CEFA;
      padding: 15px 30px;
    }

    .dashboard-header input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    .urgency-row {
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      background: #fff;
      border-left: 6px solid #ccc;
    }

    #red-row { border-left-color: red; }
    #orange-row { border-left-color: orange; }
    #yellow-row { border-left-color: gold; }
    #green-row { border-left-color: green; }

    .message-card {
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
      text-align: left;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <input type="text" id="searchBar" placeholder="Search students…">
    <button onclick="logout()">Sign Out</button>
  </header>

  <div class="urgency-row" id="red-row"><h2>High Urgency</h2><div class="messages"></div></div>
  <div class="urgency-row" id="orange-row"><h2>Medium-High</h2><div class="messages"></div></div>
  <div class="urgency-row" id="yellow-row"><h2>Medium-Low</h2><div class="messages"></div></div>
  <div class="urgency-row" id="green-row"><h2>Low</h2><div class="messages"></div></div>
</div>

<script>
/* ================================
   Counselor Accounts
================================ */
const counselors = {
  miap2k10: "1234",
  kmcconnell: "1234",
  gsorbi: "1234",
  apanlilio: "1234",
  aturner: "1234",
  cfilson: "1234"
};

const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const loginForm = document.getElementById("loginForm");
const searchBar = document.getElementById("searchBar");

/* Auto-login */
window.onload = () => {
  if (localStorage.getItem("loggedInCounselor")) {
    showDashboard();
  }
};

loginForm.addEventListener("submit", e => {
  e.preventDefault();

  const u = username.value.trim();
  const p = password.value.trim();

  if (counselors[u] === p) {
    localStorage.setItem("loggedInCounselor", u);
    showDashboard();
  } else {
    alert("Invalid login");
  }
});

function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";
  loadMessages();
}

function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

/* ================================
   Message Loader (FIXED)
================================ */
function loadMessages() {
  const counselor = localStorage.getItem("loggedInCounselor");
  const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");

  const urgencyMap = {
    "I’m in Crisis": "red-row",
    "I’m Not Coping Well": "orange-row",
    "Feeling a Little Off": "yellow-row",
    "I’m Doing Fine – Just Curious": "green-row"
  };

  document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");

  messages.forEach(msg => {
    if (msg.counselor !== counselor) return;

    const row = urgencyMap[msg.urgency];
    if (!row) return;

    // ✅ SAFE NAME RESOLUTION
    const displayName =
      msg.firstName && msg.lastName
        ? `${msg.firstName} ${msg.lastName}`
        : msg.name || "Unknown Student";

    const card = document.createElement("div");
    card.className = "message-card";
    card.innerHTML = `
      <strong>${displayName} (Grade ${msg.grade})</strong><br>
      Reason: ${msg.reason}<br>
      Urgency: ${msg.urgency}<br>
      ${msg.notes ? `Notes: ${msg.notes}<br>` : ""}
      Time: ${msg.time}
    `;

    document.getElementById(row).querySelector(".messages").appendChild(card);
  });
}

/* Search */
searchBar.addEventListener("input", () => {
  const q = searchBar.value.toLowerCase();
  document.querySelectorAll(".message-card").forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(q)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
