<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>
<style>
/* ---------- BODY & DARK MODE ---------- */
body { margin:0; font-family:sans-serif; background:#fffcf5; color:#0f172a; }
body.dark { background:#0b1220; color:#e5e7eb; }
/* ... [dark mode overrides truncated, include all your CSS from above] ... */

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
/* ... [rest of login styles] ... */

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
/* ... [rest of dashboard/header/search/button/notifications/profile/urgency/message/calendar styles from above] ... */
</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title">...LOGO & School info...</div>
    <div class="header-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchBar" class="search-input" placeholder="Search students..." />
      </div>
      <!-- School badge, buttons, calendar, notifications, profile -->
      <button class="calendar-btn" onclick="openCalendarViewOnly()">📅</button>
      <div class="notif-wrap">
        <button class="notif-btn" id="notifBell">
          <span class="notif-icon">🔔</span>
          <span class="notif-label">Alerts</span>
          <span class="notif-badge" id="bellDot"></span>
        </button>
        <div class="bell-dropdown" id="bellDropdown"></div>
      </div>
      <div class="profile-wrap" id="profileWrap">
        <div class="profile-bubble" id="profileBubble"></div>
        <div class="profile-dropdown" id="profileDropdown">
          <button id="darkModeBtn">Dark Mode</button>
          <button id="weeklyAnalyticsBtn">Weekly Analytics</button>
          <button id="signOutBtn">Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Urgency Rows -->
  <div class="urgency-row" id="red-row">...messages...</div>
  <div class="urgency-row" id="orange-row">...messages...</div>
  <div class="urgency-row" id="yellow-row">...messages...</div>
  <div class="urgency-row" id="green-row">...messages...</div>
</div>

<!-- MESSAGE MODAL -->
<div class="message-overlay" id="messageOverlay">
  <div class="message-modal">
    <h3 id="modalTitle">Message</h3>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button onclick="closeMessage()">Back</button>
      <button class="primary" onclick="goToCalendarSchedule()">Continue</button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box" id="calendarBox">
    <span class="close-calendar" onclick="closeCalendar()">✖</span>
    <div class="calendar-header">
      <button class="month-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="monthLabel"></h3>
      <button class="month-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="calendar-actions">
      <button onclick="closeCalendar()">Back</button>
      <button class="edit" id="editBtn" style="display:none;">Edit</button>
      <button class="primary" id="continueBtn" onclick="confirmAppointment()" style="display:none;">Continue</button>
    </div>
  </div>
</div>

<script>
// ---------- LOGIN ----------
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const username = document.getElementById("username");
const password = document.getElementById("password");
const profileBubble = document.getElementById("profileBubble");

// Placeholder counselor credentials
const counselors = { miap2k10:"1234", kmcconnell:"1234", gsorbi:"1234", apanlilio:"1234", aturner:"1234", cfilson:"1234" };

loginForm.onsubmit = async e => {
  e.preventDefault();
  const u=username.value, p=password.value;
  if(counselors[u]===p){ 
    localStorage.setItem("loggedInCounselor",u);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent = localStorage.getItem("loggedInCounselor").slice(0,2).toUpperCase();
  loadMessages();
  checkNotifications();
}
function logout(){ localStorage.removeItem("loggedInCounselor"); location.reload(); }

// ---------- DARK MODE ----------
const darkModeBtn = document.getElementById("darkModeBtn");
darkModeBtn.onclick = () => { 
  const isDark=document.body.classList.contains("dark");
  document.body.classList.toggle("dark",!isDark);
  darkModeBtn.textContent = !isDark ? "Light Mode":"Dark Mode";
  localStorage.setItem("darkMode",!isDark?"1":"0");
};
document.body.classList.toggle("dark",localStorage.getItem("darkMode")==="1");

function closeMessage(){ messageOverlay.classList.remove("show"); }
function goToCalendarSchedule(){ closeMessage(); openCalendar(); }

function openCalendar(){ calendarOverlay.style.display="flex"; renderCalendar(); }
function closeCalendar(){ calendarOverlay.style.display="none"; }
function renderCalendar(){ /* ... render calendar and appointments ... */ }
function changeMonth(delta){ currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+delta,1); renderCalendar(); }

// ---------- TOGGLES & SEARCH ----------

</script>
</body>
</html>
