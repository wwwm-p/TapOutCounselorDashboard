<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>TapOut! – Counselor Dashboard</title>

<!-- ✅ FIXED: Manifest must be correct path -->
<link rel="manifest" href="/counselor-manifest.json">

<!-- Theme -->
<meta name="theme-color" content="#0070c9">

<!-- PWA Meta -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- ✅ FIXED: Icons MUST match manifest -->
<link rel="icon" href="/icons/icon-192-counselor.png">
<link rel="apple-touch-icon" href="/icons/icon-192-counselor.png">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f7f6f2;
}

/* Simple layout so app actually renders */
#app{
  display:none;
  padding:20px;
}

.login-screen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

.pill-btn{
  padding:10px 16px;
  border-radius:999px;
  border:none;
  background:#0070c9;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ✅ INSTALL BUTTON -->
<div style="position:fixed; bottom:20px; right:20px; z-index:1000;">
  <button id="installBtn" class="pill-btn" style="display:none;">
    Install App
  </button>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-box">
    <h2>Counselor Login</h2>

    <input id="loginEmail" type="email" placeholder="email" required><br><br>
    <input id="loginPassword" type="password" placeholder="password" required><br><br>

    <button class="pill-btn">Login</button>
    <div id="loginError" style="color:red; display:none;"></div>
  </form>
</div>

<!-- APP -->
<div id="app">
  <h1>Dashboard Loaded ✅</h1>
  <button id="logoutBtn" class="pill-btn">Logout</button>
</div>

<script>
/* ================= AUTH ================= */
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");

loginForm.onsubmit = (e)=>{
  e.preventDefault();

  const email = loginEmail.value;
  const pass = loginPassword.value;

  if(email === "alice@school.edu" && pass === "alice123"){
    localStorage.setItem("user","1");
    openApp();
  } else {
    loginError.style.display="block";
    loginError.textContent="Invalid login";
  }
};

function openApp(){
  loginScreen.style.display="none";
  app.style.display="block";
}

logoutBtn.onclick = ()=>{
  localStorage.removeItem("user");
  location.reload();
};

if(localStorage.getItem("user")){
  openApp();
}

/* ================= INSTALL BUTTON ================= */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e)=>{
  console.log("Install prompt ready");

  e.preventDefault();
  deferredPrompt = e;

  installBtn.style.display = "block";
});

installBtn.onclick = async ()=>{
  if(!deferredPrompt) return;

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  console.log(choice.outcome);

  deferredPrompt = null;
  installBtn.style.display = "none";
};

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js")
      .then(()=>console.log("SW registered"))
      .catch(err=>console.log("SW error", err));
  });
}
</script>

</body>
</html>
