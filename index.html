<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIS Counselor Dashboard</title>

<!-- PWA Manifest -->
<link rel="manifest" href="counselor-manifest.json">
<meta name="theme-color" content="#0f8de0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SIS Dashboard">
<link rel="apple-touch-icon" href="/icons/icon-192-counselor.png">

<style>
/* ============ CSS ============ */
:root{
  --bg:#f7f6f2; --surface:#ffffff; --muted:#64748b; --text:#0f172a; --accent:#0f8de0; --accent-dark:#0070c9;
  --border:#e5e7eb; --danger:#ef4444; --warn:#f59e0b; --ok:#10b981; --shadow:0 8px 20px rgba(15,23,42,0.12);
}
body{ margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text);}
body.dark{ --bg:#0b1220; --surface:#0f172a; --text:#e5e7eb; --muted:#9ca3af; --border:#1f2937; --shadow:0 8px 20px rgba(0,0,0,0.35);}
*{box-sizing:border-box;}
button{font-family:inherit; cursor:pointer;}

/* Layout */
.app{ display:grid; grid-template-columns:260px 1fr; min-height:100vh;}
.sidebar{ background:var(--surface); border-right:1px solid var(--border); padding:20px;}
.main{ display:flex; flex-direction:column; min-height:100vh;}

/* Header */
.header{ background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px;}
.school{ display:flex; align-items:center; gap:12px;}
.school-logo{ width:42px; height:42px; border-radius:10px; background:#fff; border:2px solid var(--accent-dark); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--accent-dark);}
.school-name{ font-weight:700;}
.header-actions{ display:flex; align-items:center; gap:10px;}
.icon-btn{ width:40px; height:40px; border-radius:999px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; position:relative;}
.notif-dot{ width:8px; height:8px; border-radius:50%; background:var(--danger); position:absolute; top:8px; right:8px; display:none; box-shadow:0 0 0 2px var(--surface);}

/* Sidebar nav */
.brand{ font-weight:800; font-size:18px; margin-bottom:16px;}
.nav{ display:flex; flex-direction:column; gap:10px;}
.nav button{ text-align:left; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--surface); font-weight:600;}
.nav button.active{ border-color:var(--accent-dark); box-shadow:0 0 0 2px rgba(0,112,201,0.12);}

/* Content */
.content{ padding:24px; display:grid; gap:20px;}
.panel{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:var(--shadow);}
.panel h3{ margin:0 0 12px 0;}

/* Student list */
.student-list{ display:grid; gap:10px;}
.student-card{ display:flex; justify-content:space-between; align-items:center; gap:12px; border:1px solid var(--border); border-radius:12px; padding:12px; background:rgba(255,255,255,0.4);}
.student-info{ display:flex; align-items:center; gap:12px;}
.avatar{ width:42px; height:42px; border-radius:50%; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-weight:700; color:#334155;}
.student-name{ font-weight:700;}
.student-meta{ font-size:12px; color:var(--muted);}
.student-actions{ display:flex; gap:8px; flex-wrap:wrap;}
.pill-btn{ padding:6px 12px; border-radius:999px; border:1px solid var(--border); background:var(--surface); font-weight:600;}
.pill-btn.primary{ background:var(--accent-dark); color:#fff; border-color:var(--accent-dark);}

@media (max-width:980px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>

<!-- LOGIN SCREEN (OPTIONAL) -->
<div class="login-screen" style="display:none;">
  <div class="login-box">
    <h2>Login</h2>
    <label for="user">Username</label>
    <input type="text" id="user" placeholder="Enter username"/>
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="Enter password"/>
    <button class="pill-btn primary">Login</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">SIS Dashboard</div>
    <div class="nav">
      <button class="active">Home</button>
      <button>Students</button>
      <button>Notes</button>
      <button>Calendar</button>
      <button>Settings</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- HEADER -->
    <div class="header">
      <div class="school">
        <div class="school-logo">S</div>
        <div class="school-name">Springfield High</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn">🔔<span class="notif-dot"></span></button>
        <button class="icon-btn">⚙️</button>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div class="content">
      <!-- Example Panels -->
      <div class="panel">
        <h3>Urgent Cases</h3>
        <div class="student-list">
          <div class="student-card">
            <div class="student-info">
              <div class="avatar">A</div>
              <div>
                <div class="student-name">Alice Johnson</div>
                <div class="student-meta">High Urgency</div>
              </div>
            </div>
            <div class="student-actions">
              <button class="pill-btn primary">View</button>
            </div>
          </div>

          <div class="student-card">
            <div class="student-info">
              <div class="avatar">B</div>
              <div>
                <div class="student-name">Bob Smith</div>
                <div class="student-meta">Medium Urgency</div>
              </div>
            </div>
            <div class="student-actions">
              <button class="pill-btn">View</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h3>Notes</h3>
        <p>Click a student to view or add notes.</p>
      </div>
    </div>
  </div>
</div>

<script>
// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered:', reg))
      .catch(err => console.error('SW registration failed:', err));
  });
}

// Toggle dark mode example
document.body.classList.toggle('dark', false);
</script>
</body>
</html>
