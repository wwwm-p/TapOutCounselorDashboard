<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TapOut Counselor Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
  <h2>Counselor Login</h2>

  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />

  <button id="loginBtn">Sign In</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">

  <!-- HEADER (UNCHANGED LAYOUT) -->
  <header class="main-header">
    <h1>TapOut! - Counselor Dashboard</h1>

    <input type="text" id="searchBar" placeholder="Search students..." />

    <div class="header-buttons">
      <button onclick="openCalendar()">Open Calendar</button>
      <button onclick="openNotes()">Notes</button>
      <button onclick="logout()">Sign Out</button>
    </div>
  </header>

  <!-- URGENCY ROWS (SMILEY FACE LAYOUT KEPT) -->
  <div class="dashboard">

    <div class="urgency-row red-face" id="red-row">
      <h3>Crisis</h3>
      <div class="messages"></div>
    </div>

    <div class="urgency-row orange-face" id="orange-row">
      <h3>Not Coping Well</h3>
      <div class="messages"></div>
    </div>

    <div class="urgency-row yellow-face" id="yellow-row">
      <h3>Feeling a Little Off</h3>
      <div class="messages"></div>
    </div>

    <div class="urgency-row green-face" id="green-row">
      <h3>Doing Fine</h3>
      <div class="messages"></div>
    </div>

  </div>
</div>

<script src="counselor.js"></script>
</body>
</html>
