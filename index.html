<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapOut – Counselor Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffcf5;
}

/* ---------- HEADER ---------- */
.dashboard-header {
  background: #87CEFA;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-title {
  font-size: 22px;
  font-weight: bold;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.calendar-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid #0070c9;
  background: white;
  font-size: 18px;
  cursor: pointer;
}

.profile-bubble {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #0070c9;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

/* ---------- CALENDAR MODAL ---------- */
.calendar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.calendar-modal {
  background: white;
  width: 420px;
  padding: 20px;
  border-radius: 14px;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.calendar-header h2 {
  margin: 0;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-top: 15px;
}

.calendar-day {
  padding: 8px;
  border-radius: 6px;
  background: #f1f1f1;
  cursor: pointer;
  min-height: 50px;
  font-size: 13px;
}

.calendar-day strong {
  display: block;
}

/* urgency dots */
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 4px;
}

.red { background: red; }
.orange { background: orange; }
.yellow { background: gold; }
.green { background: green; }

/* ---------- APPOINTMENT MODAL ---------- */
.appointment-modal input,
.appointment-modal select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.appointment-modal button {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.save-btn {
  background: #0070c9;
  color: white;
}
</style>
</head>

<body>

<header class="dashboard-header">
  <div class="dashboard-title">TapOut – Counselor Dashboard</div>
  <div class="header-right">
    <button class="calendar-btn" onclick="openCalendar()">📅</button>
    <div class="profile-bubble" onclick="logout()">TA</div>
  </div>
</header>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-modal">
    <div class="calendar-header">
      <h2 id="monthLabel"></h2>
      <button onclick="closeCalendar()">✕</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<!-- ADD APPOINTMENT -->
<div class="calendar-overlay" id="appointmentOverlay">
  <div class="calendar-modal appointment-modal">
    <h3>Add Appointment</h3>
    <input id="apptName" placeholder="Student name">
    <select id="apptUrgency">
      <option value="red">Crisis</option>
      <option value="orange">Not Coping Well</option>
      <option value="yellow">Feeling Off</option>
      <option value="green">Doing Fine</option>
    </select>
    <button class="save-btn" onclick="saveAppointment()">Save</button>
  </div>
</div>

<script>
let selectedDate = "";
const today = new Date();

function openCalendar() {
  document.getElementById("calendarOverlay").style.display = "flex";
  renderCalendar();
}

function closeCalendar() {
  document.getElementById("calendarOverlay").style.display = "none";
}

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  const year = today.getFullYear();
  const month = today.getMonth();
  document.getElementById("monthLabel").textContent =
    today.toLocaleString("default", { month: "long", year: "numeric" });

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const appts = JSON.parse(localStorage.getItem("appointments") || "[]");

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${month}-${d}`;
    const day = document.createElement("div");
    day.className = "calendar-day";
    day.innerHTML = `<strong>${d}</strong>`;

    appts.filter(a => a.date === dateKey)
      .forEach(a => {
        const dot = document.createElement("div");
        dot.className = `dot ${a.urgency}`;
        day.appendChild(dot);
      });

    day.onclick = () => openAppointment(dateKey);
    grid.appendChild(day);
  }
}

function openAppointment(date) {
  selectedDate = date;
  document.getElementById("appointmentOverlay").style.display = "flex";
}

function saveAppointment() {
  const name = apptName.value;
  const urgency = apptUrgency.value;

  const appts = JSON.parse(localStorage.getItem("appointments") || "[]");
  appts.push({ date: selectedDate, name, urgency });
  localStorage.setItem("appointments", JSON.stringify(appts));

  document.getElementById("appointmentOverlay").style.display = "none";
  renderCalendar();
}

function logout() {
  alert("Logout hooked here");
}
</script>

</body>
</html>
