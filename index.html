<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffcf5;
}

/* ---------- LOGIN ---------- */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  width: 400px;
}

.login-box label {
  font-weight: bold;
  margin-top: 15px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-box button {
  margin-top: 25px;
  float: right;
  padding: 10px 25px;
  font-size: 16px;
  background: #0070c9;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display: none; }

.dashboard-header {
  background: #87CEFA;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-title {
  font-size: 22px;
  font-weight: bold;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-right input { width: 260px; padding: 10px; font-size: 16px; }

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid #0070c9;
  background: #fff;
  color: #0070c9;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.calendar-btn:hover { background: #0070c9; color: white; }

.profile-bubble {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #0070c9;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

.urgency-row {
  display: flex;
  gap: 16px;
  margin: 20px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.urgency-left { min-width: 160px; display: flex; flex-direction: column; gap: 10px; }

.urgency-header { display: flex; align-items: center; gap: 10px; }

.messages { display: flex; flex-wrap: wrap; gap: 10px; }

.message-card {
  width: 220px;
  padding: 8px 10px;
  font-size: 14px;
  background: #f9f9f9;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.face {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  position: relative;
}

.eye { width: 5px; height: 5px; background: black; border-radius: 50%; position: absolute; top: 12px; }
.eye.left { left: 11px; }
.eye.right { right: 11px; }

.mouth {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 18px;
  height: 10px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
}
.sad .mouth { transform: translateX(-50%) rotate(180deg); }
.neutral .mouth { border: none; height: 3px; background: black; width: 18px; }

.red-face { background: red; }
.orange-face { background: orange; }
.yellow-face { background: gold; }
.green-face { background: green; }

.toggle-btn {
  padding: 6px 18px;
  border-radius: 20px;
  border: 2px solid #0070c9;
  background: #fff;
  color: #0070c9;
  cursor: pointer;
}

/* ---------- CALENDAR ---------- */
.calendar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.calendar-box {
  background: white;
  padding: 20px;
  width: 420px;
  border-radius: 14px;
  position: relative;
}

.calendar-box h3 { margin: 0; text-align: center; }

.close-calendar {
  position: absolute;
  top: 6px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
  margin-top: 10px;
}

.calendar-day {
  background: #f1f1f1;
  border-radius: 6px;
  padding: 6px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 4px;
}

.red { background: red; }
.orange { background: orange; }
.yellow { background: gold; }
.green { background: green; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title">TapOut – Counselor Dashboard</div>
    <div class="header-right">
      <input id="searchBar" placeholder="Search students...">
      <button class="calendar-btn" onclick="openCalendar()">📅</button>
      <button class="calendar-btn" id="notifBell" onclick="clearBell()">🔔</button>
      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
    </div>
  </header>

  <!-- URGENCY ROWS -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>High Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Medium-High</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Medium-Low</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        <h2>Low Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box">
    <span class="close-calendar" onclick="closeCalendar()">✖</span>
    <h3 id="monthLabel"></h3>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
/* ---------- LOGIN ---------- */
const counselors = { miap2k10:"1234", kmcconnell:"1234", gsorbi:"1234", apanlilio:"1234", aturner:"1234", cfilson:"1234" };

loginForm.onsubmit = e => {
  e.preventDefault();
  if(counselors[username.value] === password.value){
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent = localStorage.getItem("loggedInCounselor").slice(0,2).toUpperCase();
  loadMessages();
  checkNotifications();
}

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

/* ---------- CALENDAR ---------- */
const today = new Date();
const calendarOverlay = document.getElementById("calendarOverlay");
const calendarGrid = document.getElementById("calendarGrid");
const monthLabel = document.getElementById("monthLabel");

function openCalendar(){
  calendarOverlay.style.display="flex";
  renderCalendar();
}

function closeCalendar(){ calendarOverlay.style.display="none"; }

function renderCalendar(){
  calendarGrid.innerHTML="";
  const y = today.getFullYear();
  const m = today.getMonth();
  monthLabel.textContent = today.toLocaleString("default",{month:"long",year:"numeric"});
  const appts = JSON.parse(localStorage.getItem("appointments")||"[]");

  for(let d=1; d<=new Date(y,m+1,0).getDate(); d++){
    const key=`${y}-${m}-${d}`;
    const cell = document.createElement("div");
    cell.className="calendar-day";
    cell.innerHTML=`<strong>${d}</strong>`;
    appts.filter(a=>a.date===key).forEach(a=>{
      const dot = document.createElement("div");
      dot.className = `dot ${a.urgency}`;
      cell.appendChild(dot);
    });
    cell.onclick = () => addAppt(key);
    calendarGrid.appendChild(cell);
  }
}

function addAppt(date){
  const urgency = prompt("Urgency (red/orange/yellow/green)");
  if(!urgency) return;
  const appts = JSON.parse(localStorage.getItem("appointments")||"[]");
  appts.push({date,urgency});
  localStorage.setItem("appointments",JSON.stringify(appts));
  renderCalendar();
  checkNotifications(); // update bell immediately
}

/* ---------- MESSAGES ---------- */
function loadMessages(){
  document.querySelectorAll(".messages").forEach(m=>m.innerHTML="");
  const counselor = localStorage.getItem("loggedInCounselor");
  const data = JSON.parse(localStorage.getItem("studentMessages")||"[]");
  const map = {"I’m in Crisis":"red-row","I’m Not Coping Well":"orange-row","Feeling a Little Off":"yellow-row","I’m Doing Fine – Just Curious":"green-row"};
  data.forEach(m=>{
    if(m.counselor!==counselor) return;
    const card = document.createElement("div");
    card.className="message-card";
    card.innerHTML=`<strong>${m.firstName} ${m.lastName}</strong><br>Grade ${m.grade}<br>${m.reason}`;
    document.querySelector(`#${map[m.urgency]} .messages`).appendChild(card);
  });
}

/* ---------- SEARCH ---------- */
searchBar.oninput = () => {
  const q = searchBar.value.toLowerCase();
  document.querySelectorAll(".message-card").forEach(c => c.style.display = c.textContent.toLowerCase().includes(q)?"block":"none");
};

/* ---------- TOGGLE ---------- */
function toggleMessages(id){
  const box=document.querySelector(`#${id} .messages`);
  const btn=document.querySelector(`#${id} .toggle-btn`);
  const hide = box.style.display!=="none";
  box.style.display = hide?"none":"flex";
  btn.textContent = hide?"Show Messages":"Hide Messages";
}

/* ---------- NOTIFICATIONS ---------- */
const notifBell = document.getElementById("notifBell");

function checkNotifications(){
  const counselor = localStorage.getItem("loggedInCounselor");
  const students = JSON.parse(localStorage.getItem("studentMessages") || "[]");
  const appointments = JSON.parse(localStorage.getItem("appointments") || "[]");

  let crisisToday = students.some(s => s.counselor===counselor && s.urgency==="I’m in Crisis");
  let todayDate = new Date();
  let todayKey = `${todayDate.getFullYear()}-${todayDate.getMonth()}-${todayDate.getDate()}`;
  let apptToday = appointments.some(a => a.date===todayKey);

  if(crisisToday || apptToday){
    notifBell.style.color="red";
    if(Notification.permission==="granted"){
      if(crisisToday) new Notification("Crisis Alert!", {body:"A student has marked 'I’m in Crisis'."});
      if(apptToday) new Notification("Appointment Reminder", {body:"You have an appointment today."});
    } else Notification.requestPermission();
  } else {
    notifBell.style.color="#0070c9";
  }
}

function clearBell(){ notifBell.style.color="#0070c9"; }

setInterval(checkNotifications,10000);

/* ---------- INITIAL ---------- */
window.onload = ()=>{ if(localStorage.getItem("loggedInCounselor")) showDashboard(); }
</script>
</body>
</html>
