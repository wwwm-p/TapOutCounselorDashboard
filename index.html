<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>

<!-- PWA Manifest -->
<link rel="manifest" href="counselor-manifest.json">
<meta name="theme-color" content="#0070c9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Counselor Dashboard">

<!-- Icons -->
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<style>
  :root {
    --bg:#f7f6f2; --surface:#ffffff; --text:#0f172a; --accent:#0f8de0; --accent-dark:#0070c9;
  }
  body{ margin:0; font-family:system-ui, sans-serif; background:var(--bg); color:var(--text); }
  .pill-btn{ padding:8px 16px; border-radius:999px; border:none; background:var(--accent-dark); color:#fff; cursor:pointer; font-weight:600; }
  #installBtn{ display:none; margin-left:10px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h2>Counselor Login</h2>
  <input id="loginEmail" placeholder="Email" type="email" /><br>
  <input id="loginPassword" placeholder="Password" type="password" /><br>
  <button id="loginBtn" class="pill-btn">Sign In</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h1>Welcome, Counselor!</h1>
  <button id="installBtn" class="pill-btn">Install App</button>
  <button id="logoutBtn" class="pill-btn">Sign Out</button>
</div>

<script>
/* ===================== MOCK LOGIN ===================== */
const loginBtn = document.getElementById('loginBtn');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const loginScreen = document.getElementById('loginScreen');
const app = document.getElementById('app');
const logoutBtn = document.getElementById('logoutBtn');

loginBtn.onclick = () => {
  const email = loginEmail.value.trim();
  const pass = loginPassword.value.trim();
  if(!email || !pass){ alert("Enter credentials"); return; }
  localStorage.setItem("loggedInCounselor","true");
  loginScreen.style.display = "none";
  app.style.display = "block";
};

logoutBtn.onclick = () => {
  localStorage.removeItem("loggedInCounselor");
  loginScreen.style.display = "block";
  app.style.display = "none";
};

if(localStorage.getItem("loggedInCounselor")){
  loginScreen.style.display = "none";
  app.style.display = "block";
}

/* ===================== INSTALL PWA ===================== */
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-block';
});

installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  console.log('Install outcome:', choice.outcome);
  deferredPrompt = null;
  installBtn.style.display = 'none';
});

/* ===================== SERVICE WORKER ===================== */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg=>console.log('SW Registered', reg))
    .catch(err=>console.log('SW Registration failed', err));
}
</script>

</body>
</html>
