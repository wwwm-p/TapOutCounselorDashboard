<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapOut! - Counselor Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header class="main-header">
    <h1>TapOut! - Counselor Dashboard</h1>
  </header>

  <!-- DASHBOARD: URGENCY ROWS -->
  <div class="dashboard">
    <div class="urgency-row" id="red-row">
      <div class="face red-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests-list"></ul>
    </div>

    <div class="urgency-row" id="orange-row">
      <div class="face orange-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests-list"></ul>
    </div>

    <div class="urgency-row" id="yellow-row">
      <div class="face yellow-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests-list"></ul>
    </div>

    <div class="urgency-row" id="green-row">
      <div class="face green-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests-list"></ul>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
