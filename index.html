<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIS Counselor Dashboard</title>

<!-- PWA: Manifest -->
<link rel="manifest" href="counselor-manifest.json">

<!-- App Metadata -->
<meta name="theme-color" content="#0070c9" />
<meta name="description" content="Counselor dashboard for student support and communication." />
<meta name="application-name" content="SIS Counselor Dashboard" />

<!-- Apple PWA -->
<link rel="apple-touch-icon" href="icons/icon-192-counselor.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Mobile Web App -->
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Counselor Dashboard" />

<!-- Icons -->
<link rel="icon" sizes="192x192" href="icons/icon-192-counselor.png" />

<style>
/* (Your CSS stays the same as before, no changes needed) */
:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --muted:#64748b;
  --text:#0f172a;
  --accent:#0f8de0;
  --accent-dark:#0070c9;
  --border:#e5e7eb;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#10b981;
  --shadow:0 8px 20px rgba(15,23,42,0.12);
}
/* ... rest of your CSS ... */
</style>
</head>
<body>
<button id="pwaInstallBtn" class="pill-btn primary pwa-install-btn" type="button">Install App</button>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-box">
    <h2>Counselor Login</h2>
    <label>Email</label>
    <input id="loginEmail" type="email" required placeholder="name@school.edu" />
    <label>Password</label>
    <input id="loginPassword" type="password" required placeholder="••••••••" />
    <div style="display:flex; justify-content:flex-end;">
      <button type="submit" class="pill-btn primary">Sign In</button>
    </div>
    <div style="margin-top:10px; font-size:12px; color:var(--muted);">
      Demo counselors: Alice Johnson, Bob Smith
    </div>
  </form>
</div>

<!-- Main App -->
<div id="app" class="app" style="display:none;">
  <!-- ... rest of your main app HTML stays unchanged ... -->
</div>

<!-- Urgency Modal -->
<div id="urgencyOverlay" class="overlay">
  <!-- ... urgency modal content stays unchanged ... -->
</div>

<script>
const mockData = {
  counselors: [
    { id:"c1", name:"Alice Johnson", email:"alice@school.edu", password:"alice123" },
    { id:"c2", name:"Bob Smith", email:"bob@school.edu", password:"bob123" }
  ],
  schoolInfo: { name:"Riverside High", term:"Fall 2026", logoUrl:"" },
  studentsByCounselor: {
    c1: [
      { id:"s1", firstName:"Maya", lastName:"Foster", grade:"10" },
      { id:"s2", firstName:"Noah", lastName:"Garcia", grade:"9" },
      { id:"s3", firstName:"Olivia", lastName:"Harris", grade:"11" }
    ]
  },
  notesByStudent: {
    s1: [
      { text:"Discussed study plan.", timestamp:"2026-02-15 09:20" },
      { text:"Follow-up on attendance.", timestamp:"2026-02-12 08:10" }
    ],
    s2: [
      { text:"Schedule change request.", timestamp:"2026-02-14 14:30" }
    ]
  },
  messagesByCounselor: {
    c1: [
      { student:"Maya Foster", urgency:"high", text:"I’m in Crisis", ts:"2026-02-15 10:12", read:false },
      { student:"Noah Garcia", urgency:"med", text:"Feeling a Little Off", ts:"2026-02-15 11:00", read:false },
      { student:"Olivia Harris", urgency:"low", text:"Just checking in", ts:"2026-02-15 12:20", read:false }
    ]
  }
};

let currentCounselor = null;
let students = [];
let notifications = [];

// ✅ Fixed: define email/password inputs
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");

const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");

// ✅ Fixed login handler
document.getElementById("loginForm").onsubmit = (e)=>{
  e.preventDefault();
  const email = loginEmail.value.trim();
  const password = loginPassword.value.trim();
  const match = mockData.counselors.find(c => c.email === email && c.password === password);
  if(!match) return alert("Invalid credentials");
  localStorage.setItem("loggedInCounselor", match.id);
  currentCounselor = match;
  openDashboard();
};

// ... rest of your JS remains the same ...
// loadSchoolInfo, loadStudents, renderStudents, renderAllNotes, loadNotifications, renderUrgencySummary, 
// openUrgency, closeUrgency, renderUrgencyRows, renderCalendar, nav buttons, PWA install, service worker registration
</script>
</body>
</html>
