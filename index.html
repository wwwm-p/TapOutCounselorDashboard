<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TapOut Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="main-header">
  <h1>TapOut! - Counselor Dashboard</h1>

  <div class="header-center">
    <input type="text" id="searchBar" placeholder="Search students..." />
  </div>

  <div class="header-right">
    <button onclick="openCalendar()">Open Calendar</button>
    <button onclick="toggleNotes()">Notes</button>
    <button>Sign Out</button>
  </div>
</header>

<div class="dashboard">

  <div class="urgency-row" id="red-row">
    <div class="face red-face"></div>
    <ul></ul>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="face orange-face"></div>
    <ul></ul>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="face yellow-face"></div>
    <ul></ul>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="face green-face"></div>
    <ul></ul>
  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
