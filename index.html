<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.dashboard-title { font-size:22px; font-weight:bold; }
.header-right { display:flex; align-items:center; gap:10px; }
.header-right input { width:260px; padding:10px; font-size:16px; }

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid #0070c9;
  background:#fff;
  color:#0070c9;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}
.calendar-btn:hover { background:#0070c9; color:white; }

.bell-dot { position:absolute; top:4px; right:4px; width:10px; height:10px; background:red; border-radius:50%; display:none; }
.bell-dropdown { position:absolute; top:48px; right:0; background:#fff; border:1px solid #ccc; border-radius:10px; width:260px; display:none; flex-direction:column; box-shadow:0 6px 16px rgba(0,0,0,0.15); z-index:1000; font-size:14px; overflow:hidden; }
.bell-dropdown div { padding:10px 12px; border-bottom:1px solid #eee; }
.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f1f1f1; }

/* ---------- PROFILE ---------- */
.profile-bubble { width:42px; height:42px; border-radius:50%; background:#0070c9; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }

/* ---------- CALENDAR ---------- */
.calendar-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.calendar-overlay:target { display:flex; }

.calendar-box { background:white; padding:20px; width:420px; border-radius:14px; position:relative; }
.calendar-box h3 { margin:0; text-align:center; }
.close-calendar { position:absolute; top:6px; right:10px; cursor:pointer; font-size:18px; text-decoration:none; color:black; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px; }
.calendar-day { background:#f1f1f1; border-radius:6px; padding:6px; cursor:pointer; font-size:13px; display:flex; flex-direction:column; align-items:center; }
.dot { width:8px; height:8px; border-radius:50%; margin-top:4px; }
.red { background:red; }
.orange { background:orange; }
.yellow { background:gold; }
.green { background:green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
<header class="dashboard-header">
  <div class="dashboard-title">TapOut – Counselor Dashboard</div>
  <div class="header-right">
    <input id="searchBar" placeholder="Search students...">
    <a href="#calendarOverlay" class="calendar-btn">📅</a>

    <div style="position:relative;">
      <button class="calendar-btn" id="notifBell">🔔<span class="bell-dot" id="bellDot"></span></button>
      <div class="bell-dropdown" id="bellDropdown"></div>
    </div>

    <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
  </div>
</header>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box">
    <a href="#" class="close-calendar">✖</a>
    <h3 id="monthLabel"></h3>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const profileBubble = document.getElementById("profileBubble");

const counselors = { miap2k10:"1234" };

loginForm.onsubmit = e => {
  e.preventDefault();
  if(counselors[username.value]===password.value){
    localStorage.setItem("loggedInCounselor", username.value);
    loginScreen.style.display="none";
    dashboardScreen.style.display="block";
    profileBubble.textContent = username.value.slice(0,2).toUpperCase();
    renderCalendar();
  } else alert("Invalid login");
};

const today = new Date();
const calendarGrid = document.getElementById("calendarGrid");
const monthLabel = document.getElementById("monthLabel");

function renderCalendar(){
  calendarGrid.innerHTML="";
  const y=today.getFullYear(), m=today.getMonth();
  monthLabel.textContent = today.toLocaleString("default",{month:"long",year:"numeric"});

  for(let d=1; d<=new Date(y,m+1,0).getDate(); d++){
    const cell=document.createElement("div");
    cell.className="calendar-day";
    cell.innerHTML=`<strong>${d}</strong>`;
    calendarGrid.appendChild(cell);
  }
}
</script>

</body>
</html>
