<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Counselor Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div style="
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
">

  <div style="width:600px;">
    <label style="font-size:20px;font-weight:bold;">Username</label>
    <input id="username" type="text" style="width:100%;height:40px;">

    <br><br>

    <label style="font-size:20px;font-weight:bold;">Password</label>
    <input id="password" type="password" style="width:100%;height:40px;">

    <br><br>

    <a href="#" style="color:#0070c9;">Forgot Username or Password?</a>

    <br><br>

    <button id="loginBtn" style="float:right;">Sign In</button>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
