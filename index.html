<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>
<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.header-right { display:flex; align-items:center; gap:10px; }

/* ---------- SEARCH BAR ---------- */
.search-wrap {
  display:flex;
  align-items:center;
  gap:8px;
  background:#ffffff;
  border:1px solid #e6e6e6;
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}
.search-icon { font-size:16px; opacity:0.7; }
.search-input {
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  width:220px;
}

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid #0070c9;
  background:#fff; color:#0070c9;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.calendar-btn:hover { background:#0070c9; color:white; }

/* ---------- NOTIFICATIONS ---------- */
.notif-wrap { position:relative; }
.notif-btn {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #e6e6e6;
  background:#ffffff;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  cursor:pointer;
}
.notif-icon { font-size:16px; }
.notif-label { font-size:14px; font-weight:600; color:#2b2b2b; }
.notif-badge {
  width:8px; height:8px; border-radius:50%;
  background:#ff3b30; display:none;
  box-shadow:0 0 0 2px #fff;
}
.bell-dropdown {
  position:absolute;
  top:48px;
  right:0;
  background:#fff;
  border:1px solid #e6e6e6;
  border-radius:12px;
  width:280px;
  display:none;
  flex-direction:column;
  box-shadow:0 10px 24px rgba(0,0,0,0.15);
  z-index:1000;
  font-size:14px;
  overflow:hidden;
}
.bell-dropdown div {
  padding:12px 14px;
  border-bottom:1px solid #f0f0f0;
}
.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f7f7f7; }

/* ---------- PROFILE ---------- */
.profile-bubble {
  width:42px; height:42px; border-radius:50%;
  background:#0070c9; color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  display:flex; gap:16px; margin:20px; padding:16px;
  background:#fff; border-radius:12px; border-left:6px solid;
}
#red-row { border-color:red; }
#orange-row { border-color:orange; }
#yellow-row { border-color:gold; }
#green-row { border-color:green; }

.urgency-left { min-width:160px; display:flex; flex-direction:column; gap:10px; }
.urgency-header { display:flex; align-items:center; gap:10px; }
.messages { display:flex; flex-wrap:wrap; gap:10px; }
.message-card {
  width:220px; padding:8px 10px; font-size:14px;
  background:#f9f9f9; border:1px solid #ccc; border-radius:6px; line-height:1.3;
}
.message-meta { font-size:12px; color:#555; margin-top:4px; }

/* SMILEY FACES */
.face { width:40px; height:40px; border-radius:50%; position:relative; }
.eye { width:5px; height:5px; background:black; border-radius:50%; position:absolute; top:12px; }
.eye.left { left:11px; }
.eye.right { right:11px; }
.mouth { position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:18px; height:10px; border:3px solid black; border-color:black transparent transparent transparent; border-radius:50%; }
.sad .mouth { transform:translateX(-50%) rotate(180deg); }
.neutral .mouth { border:none; height:3px; background:black; width:18px; }
.red-face { background:red; }
.orange-face { background:orange; }
.yellow-face { background:gold; }
.green-face { background:green; }

.toggle-btn { padding:6px 18px; border-radius:20px; border:2px solid #0070c9; background:#fff; color:#0070c9; cursor:pointer; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title" style="display:flex; align-items:center; gap:10px; font-size:20px;">
      <span style="font-weight:700; color:#0f172a;">TapOut</span>
      <span style="color:#94a3b8; font-weight:600;">—</span>
      <span style="font-weight:500; color:#334155;">Counselor Dashboard</span>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchBar" class="search-input" placeholder="Search students..." />
      </div>
      <button class="calendar-btn" onclick="openCalendar()">📅</button>
      <div class="notif-wrap">
        <button class="notif-btn" id="notifBell">
          <span class="notif-icon">🔔</span>
          <span class="notif-label">Alerts</span>
          <span class="notif-badge" id="bellDot"></span>
        </button>
        <div class="bell-dropdown" id="bellDropdown"></div>
      </div>
      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
    </div>
  </header>

  <!-- URGENCY ROWS -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>High Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-High</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-Low</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Low Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>

<script>
/* ---------- LOGIN ---------- */
const loginForm = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");
const profileBubble = document.getElementById("profileBubble");
const searchBar = document.getElementById("searchBar");

const counselors = { miap2k10:"1234", kmcconnell:"1234", gsorbi:"1234", apanlilio:"1234", aturner:"1234", cfilson:"1234" };

loginForm.onsubmit = e => {
  e.preventDefault();
  if(counselors[username.value]===password.value){
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent = localStorage.getItem("loggedInCounselor").slice(0,2).toUpperCase();
  loadMessages();
  checkNotifications();
}

function logout(){ localStorage.removeItem("loggedInCounselor"); location.reload(); }

/* ---------- MESSAGES ---------- */
function loadMessages(){
  document.querySelectorAll(".messages").forEach(m=>m.innerHTML="");
  const counselor = localStorage.getItem("loggedInCounselor");
  const data = JSON.parse(localStorage.getItem("studentMessages")||"[]");
  const map = {"I’m in Crisis":"red-row","I’m Not Coping Well":"orange-row","Feeling a Little Off":"yellow-row","I’m Doing Fine – Just Curious":"green-row"};

  data.forEach(m=>{
    if(m.counselor !== counselor) return;

    const rowId = map[m.urgency] || "green-row";
    const card = document.createElement("div");
    card.className = "message-card";

    const dateTime = m.dateTime || m.time || "Unknown time";
    const notes = m.notes ? `<br><em>Notes: ${m.notes}</em>` : "";

    card.innerHTML = `
      <strong>${m.firstName} ${m.lastName || ""}</strong><br>
      Grade: ${m.grade}<br>
      ${m.reason}<br>
      <div class="message-meta">Sent: ${dateTime}</div>
      ${notes}
    `;
    document.querySelector(`#${rowId} .messages`).appendChild(card);
  });
}

/* ---------- SEARCH ---------- */
searchBar.oninput = () => {
  const q = searchBar.value.toLowerCase();
  document.querySelectorAll(".message-card").forEach(c => c.style.display = c.textContent.toLowerCase().includes(q)?"block":"none");
};

/* ---------- TOGGLE ---------- */
function toggleMessages(id){
  const box=document.querySelector(`#${id} .messages`);
  const btn=document.querySelector(`#${id} .toggle-btn`);
  const hide = box.style.display!=="none";
  box.style.display = hide?"none":"flex";
  btn.textContent = hide?"Show Messages":"Hide Messages";
}

/* ---------- NOTIFICATIONS ---------- */
const bellDot = document.getElementById("bellDot");
const bellDropdown = document.getElementById("bellDropdown");
const notifBell = document.getElementById("notifBell");

function checkNotifications(){
  const counselor = localStorage.getItem("loggedInCounselor");
  const students = JSON.parse(localStorage.getItem("studentMessages")||"[]");
  const appointments = JSON.parse(localStorage.getItem("appointments")||"[]");

  const crisisStudents = students.filter(s=>s.counselor===counselor && s.urgency==="I’m in Crisis");
  bellDot.style.display = crisisStudents.length ? "block" : "none";

  bellDropdown.innerHTML = "";
  crisisStudents.forEach(s=>{
    const div = document.createElement("div");
    div.textContent = `🚨 Student in Crisis: ${s.firstName} ${s.lastName || ""}`;
    bellDropdown.appendChild(div);
  });
}

notifBell.onclick = () => {
  bellDropdown.style.display = bellDropdown.style.display==="flex" ? "none" : "flex";
  bellDot.style.display="none";
}

setInterval(checkNotifications,5000);
</script>
</body>
</html>
