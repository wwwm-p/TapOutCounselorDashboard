<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Login & Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fffcf5;
      text-align: center;
    }

    /* LOGIN */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
      text-align: left;
    }

    .login-box label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
      font-size: 18px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      float: right;
      padding: 10px 25px;
      font-size: 16px;
      background: #0070c9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* DASHBOARD */
    #dashboardScreen {
      display: none;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #87CEFA;
      padding: 15px 30px;
    }

    .dashboard-header input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    .dashboard-header button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    /* URGENCY ROWS */
    .urgency-row {
      margin: 20px 0;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #fff;
      text-align: left;
    }

    .urgency-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .urgency-row h2 {
      margin: 0;
    }

    .messages {
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .message-card {
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }

    /* TOGGLE BUTTON */
    .toggle-btn {
      margin: 6px 0 10px 52px; /* aligns under emoji */
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      background: #0070c9;
      color: white;
      cursor: pointer;
    }

    /* FACES */
    .face {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .eye {
      width: 5px;
      height: 5px;
      background: black;
      border-radius: 50%;
      position: absolute;
      top: 12px;
    }

    .eye.left { left: 11px; }
    .eye.right { right: 11px; }

    .mouth {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 10px;
      border: 3px solid black;
      border-color: black transparent transparent transparent;
      border-radius: 50%;
      bottom: 8px;
    }

    .sad .mouth {
      transform: translateX(-50%) rotate(180deg);
    }

    .neutral .mouth {
      border: none;
      width: 18px;
      height: 3px;
      background: black;
      bottom: 10px;
    }

    .red-face { background: red; }
    .orange-face { background: orange; }
    .yellow-face { background: gold; }
    .green-face { background: green; }

    #red-row { border-left: 6px solid red; }
    #orange-row { border-left: 6px solid orange; }
    #yellow-row { border-left: 6px solid gold; }
    #green-row { border-left: 6px solid green; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <input type="text" placeholder="Search students...">
    <button onclick="logout()">Sign Out</button>
  </header>

  <!-- RED -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-header">
      <div class="face red-face sad">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <h2>High Urgency</h2>
    </div>
    <button class="toggle-btn" onclick="toggleMessages('red-row')">Show Messages</button>
    <div class="messages hidden"></div>
  </div>

  <!-- ORANGE -->
  <div class="urgency-row" id="orange-row">
    <div class="urgency-header">
      <div class="face orange-face sad">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <h2>Medium-High Urgency</h2>
    </div>
    <button class="toggle-btn" onclick="toggleMessages('orange-row')">Show Messages</button>
    <div class="messages hidden"></div>
  </div>

  <!-- YELLOW -->
  <div class="urgency-row" id="yellow-row">
    <div class="urgency-header">
      <div class="face yellow-face neutral">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <h2>Medium-Low Urgency</h2>
    </div>
    <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Show Messages</button>
    <div class="messages hidden"></div>
  </div>

  <!-- GREEN -->
  <div class="urgency-row" id="green-row">
    <div class="urgency-header">
      <div class="face green-face">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <h2>Low Urgency</h2>
    </div>
    <button class="toggle-btn" onclick="toggleMessages('green-row')">Show Messages</button>
    <div class="messages hidden"></div>
  </div>
</div>

<script>
  const counselors = {
    "miap2k10": "1234",
    "kmcconnell": "1234",
    "gsorbi": "1234",
    "apanlilio": "1234",
    "aturner": "1234",
    "cfilson": "1234"
  };

  const loginScreen = document.getElementById("loginScreen");
  const dashboardScreen = document.getElementById("dashboardScreen");

  window.onload = () => {
    if (localStorage.getItem("loggedInCounselor")) showDashboard();
  };

  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const u = username.value.trim();
    const p = password.value.trim();
    if (counselors[u] === p) {
      localStorage.setItem("loggedInCounselor", u);
      showDashboard();
    } else alert("Invalid login");
  });

  function showDashboard() {
    loginScreen.style.display = "none";
    dashboardScreen.style.display = "block";
    loadMessages();
  }

  function logout() {
    localStorage.removeItem("loggedInCounselor");
    location.reload();
  }

  function toggleMessages(rowId) {
    const row = document.getElementById(rowId);
    const box = row.querySelector(".messages");
    const btn = row.querySelector(".toggle-btn");

    box.classList.toggle("hidden");
    btn.textContent = box.classList.contains("hidden")
      ? "Show Messages"
      : "Hide Messages";
  }

  function loadMessages() {
    const counselor = localStorage.getItem("loggedInCounselor");
    const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");

    const map = {
      "I’m in Crisis": "red-row",
      "I’m Not Coping Well": "orange-row",
      "Feeling a Little Off": "yellow-row",
      "I’m Doing Fine – Just Curious": "green-row"
    };

    document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");

    messages.forEach(msg => {
      if (msg.counselor !== counselor) return;
      const row = document.getElementById(map[msg.urgency] || "green-row");
      const card = document.createElement("div");
      card.className = "message-card";
      card.innerHTML = `<strong>${msg.name}</strong><br>${msg.reason}`;
      row.querySelector(".messages").appendChild(card);
    });
  }
</script>

</body>
</html>
