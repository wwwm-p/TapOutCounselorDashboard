<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Counselor Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="text-align:center; margin-top:100px;">
  <h2>Counselor Sign In</h2>
  <input type="email" id="loginEmail" placeholder="Enter your school email" />
  <br><br>
  <button class="btn" onclick="login()">Sign In</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none;">

  <!-- HEADER -->
  <header class="main-header">
    <h1>TapOut! - Counselor Dashboard</h1>

    <div class="header-center">
      <input type="text" id="studentSearchHeader" placeholder="Search students..." />
    </div>

    <div class="header-right">
      <button class="btn" onclick="openCalendar()">Open Calendar</button>
      <button class="btn" onclick="toggleStudentsPanel()">Students</button>
      <button class="btn" onclick="toggleNotesPanel()">Notes</button>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <!-- DASHBOARD ROWS -->
  <div class="dashboard">

    <div class="urgency-row" id="red-row">
      <div class="face red-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests"></ul>
    </div>

    <div class="urgency-row" id="orange-row">
      <div class="face orange-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests"></ul>
    </div>

    <div class="urgency-row" id="yellow-row">
      <div class="face yellow-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests"></ul>
    </div>

    <div class="urgency-row" id="green-row">
      <div class="face green-face"><div class="eyes"></div><div class="mouth"></div></div>
      <ul class="requests"></ul>
    </div>

  </div>

</div>

<script src="counselor.js"></script>
</body>
</html>
