<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapOut – Counselor Dashboard</title>

<style>
:root {
  --bg: #fffcf5;
  --card: #ffffff;
  --text: #000;
  --header: #87CEFA;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2a2a2a;
  --text: #fff;
  --header: #333;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.dashboard-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--header);
  padding: 12px 20px;
  flex-wrap: wrap;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-left img {
  width: 36px;
  height: 36px;
}

.dashboard-title {
  font-size: 20px;
  font-weight: bold;
}

.signed-in {
  font-size: 13px;
  opacity: 0.8;
}

.header-right {
  display: flex;
  gap: 10px;
  align-items: center;
}

.header-right input {
  padding: 6px 8px;
}

.header-right button {
  padding: 6px 10px;
  cursor: pointer;
}

/* URGENCY ROWS */
.urgency-row {
  margin: 14px;
  padding: 10px;
  border-radius: 10px;
  background: var(--card);
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.urgency-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.urgency-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.urgency-controls {
  margin-left: auto;
}

.urgency-controls button {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 14px;
  cursor: pointer;
}

/* MESSAGES */
.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.message-card {
  background: var(--bg);
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 12px;
  width: 220px;
}

/* FACES */
.face {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  position: relative;
}

.eye {
  width: 5px;
  height: 5px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 11px;
}

.eye.left { left: 10px; }
.eye.right { right: 10px; }

.mouth {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 16px;
  height: 8px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
}

.sad .mouth {
  transform: translateX(-50%) rotate(180deg);
}

.neutral .mouth {
  border: none;
  height: 3px;
  background: black;
}

.red-face { background: red; }
.orange-face { background: orange; }
.yellow-face { background: gold; }
.green-face { background: green; }

/* MOBILE */
@media (max-width: 600px) {
  .header-right {
    width: 100%;
    justify-content: space-between;
  }

  .messages {
    justify-content: center;
  }
}
</style>
</head>

<body>

<header class="dashboard-header">
  <div class="header-left">
    <img src="logo.png" alt="School Logo">
    <div>
      <div class="dashboard-title">TapOut – Counselor Dashboard</div>
      <div class="signed-in">Signed in as: <span id="counselorName">Counselor</span></div>
    </div>
  </div>

  <div class="header-right">
    <input id="searchBar" placeholder="Search students">
    <button onclick="toggleDarkMode()">🌙</button>
    <button onclick="logout()">Sign Out</button>
  </div>
</header>

<div id="dashboard">

  <!-- RED -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-header">
      <div class="urgency-left">
        <div class="face red-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <strong>High Urgency</strong>
      </div>
      <div class="urgency-controls">
        <button onclick="toggleMessages('red-row', this)">Hide Messages</button>
      </div>
    </div>
    <div class="messages"></div>
  </div>

  <!-- ORANGE -->
  <div class="urgency-row" id="orange-row">
    <div class="urgency-header">
      <div class="urgency-left">
        <div class="face orange-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <strong>Medium-High</strong>
      </div>
      <div class="urgency-controls">
        <button onclick="toggleMessages('orange-row', this)">Hide Messages</button>
      </div>
    </div>
    <div class="messages"></div>
  </div>

  <!-- YELLOW -->
  <div class="urgency-row" id="yellow-row">
    <div class="urgency-header">
      <div class="urgency-left">
        <div class="face yellow-face neutral">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <strong>Medium-Low</strong>
      </div>
      <div class="urgency-controls">
        <button onclick="toggleMessages('yellow-row', this)">Hide Messages</button>
      </div>
    </div>
    <div class="messages"></div>
  </div>

  <!-- GREEN -->
  <div class="urgency-row" id="green-row">
    <div class="urgency-header">
      <div class="urgency-left">
        <div class="face green-face">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <strong>Low Urgency</strong>
      </div>
      <div class="urgency-controls">
        <button onclick="toggleMessages('green-row', this)">Hide Messages</button>
      </div>
    </div>
    <div class="messages"></div>
  </div>

</div>

<script>
document.getElementById("counselorName").textContent =
  localStorage.getItem("counselorName") || "Counselor";

function toggleMessages(rowId, btn) {
  const box = document.querySelector(`#${rowId} .messages`);
  const hidden = box.style.display === "none";
  box.style.display = hidden ? "flex" : "none";
  btn.textContent = hidden ? "Hide Messages" : "Show Messages";
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function logout() {
  location.reload();
}
</script>

</body>
</html>
