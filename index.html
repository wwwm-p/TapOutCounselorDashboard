<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Counselor Login & Dashboard</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffcf5;
}

/* LOGIN */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  width: 400px;
}

.login-box label {
  font-weight: bold;
  margin: 15px 0 5px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 18px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-box button {
  float: right;
  padding: 10px 25px;
  background: #0070c9;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
#dashboardScreen {
  display: none;
  padding: 20px;
}

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #87CEFA;
  padding: 15px 30px;
}

.dashboard-header input {
  width: 300px;
  padding: 10px;
  font-size: 16px;
}

/* URGENCY ROWS */
.urgency-row {
  display: flex;
  gap: 15px;
  margin: 18px 0;
  padding: 15px;
  border-radius: 10px;
  background: #fff;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.urgency-left {
  min-width: 150px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.urgency-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.urgency-row h2 {
  margin: 0;
  font-size: 16px;
}

/* TOGGLE */
.toggle-btn {
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 20px;
  border: 1px solid #0070c9;
  background: white;
  color: #0070c9;
  cursor: pointer;
}

/* FACES */
.face {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  position: relative;
}

.eye {
  width: 5px;
  height: 5px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 12px;
}

.eye.left { left: 10px; }
.eye.right { right: 10px; }

.mouth {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 8px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
  bottom: 7px;
}

.sad .mouth { transform: translateX(-50%) rotate(180deg); }
.neutral .mouth {
  border: none;
  height: 3px;
  background: black;
  bottom: 10px;
}

.red-face { background: red; }
.orange-face { background: orange; }
.yellow-face { background: gold; }
.green-face { background: green; }

/* MESSAGES */
.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  flex: 1;
}

.message-card {
  max-width: 220px;
  padding: 10px 12px;
  background: #f7f7f7;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 13px;
}

.message-name {
  font-weight: bold;
  font-size: 14px;
}

.message-meta {
  font-size: 12px;
  color: #666;
  margin-bottom: 4px;
}

.message-notes {
  margin-top: 6px;
  padding-left: 8px;
  border-left: 3px solid #ccc;
  font-size: 12px;
  color: #444;
}

.message-time {
  margin-top: 6px;
  font-size: 11px;
  color: #888;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <input id="searchBar" placeholder="Search students...">
    <button onclick="logout()">Sign Out</button>
  </header>

  <!-- ROW TEMPLATE -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>High Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-High</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-Low</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Low Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>

<script>
const counselors = {
  miap2k10:"1234", kmcconnell:"1234", gsorbi:"1234",
  apanlilio:"1234", aturner:"1234", cfilson:"1234"
};

const loginScreen = document.getElementById("loginScreen");
const dashboardScreen = document.getElementById("dashboardScreen");

loginForm.addEventListener("submit", e => {
  e.preventDefault();
  if (counselors[username.value] === password.value) {
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
});

function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";
  loadMessages();
}

function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

function toggleMessages(id) {
  const box = document.querySelector(`#${id} .messages`);
  const btn = document.querySelector(`#${id} .toggle-btn`);
  const hidden = box.style.display === "none";
  box.style.display = hidden ? "flex" : "none";
  btn.textContent = hidden ? "Hide Messages" : "Show Messages";
}

function loadMessages() {
  const counselor = localStorage.getItem("loggedInCounselor");
  const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");
  document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");

  const map = {
    "I’m in Crisis":"red-row",
    "I’m Not Coping Well":"orange-row",
    "Feeling a Little Off":"yellow-row",
    "I’m Doing Fine – Just Curious":"green-row"
  };

  messages.forEach(msg => {
    if (msg.counselor !== counselor) return;
    const row = document.getElementById(map[msg.urgency]);
    const card = document.createElement("div");
    card.className = "message-card";
    card.innerHTML = `
      <div class="message-name">${msg.firstName} ${msg.lastName}</div>
      <div class="message-meta">Grade ${msg.grade} • ${msg.urgency}</div>
      <div>${msg.reason}</div>
      ${msg.notes ? `<div class="message-notes">${msg.notes}</div>` : ""}
      <div class="message-time">${msg.time}</div>
    `;
    row.querySelector(".messages").appendChild(card);
  });
}

if (localStorage.getItem("loggedInCounselor")) showDashboard();
</script>

</body>
</html>
