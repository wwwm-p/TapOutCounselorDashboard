<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.dashboard-title { font-size:22px; font-weight:bold; }
.header-right { display:flex; align-items:center; gap:10px; position:relative; }
.header-right input { width:260px; padding:10px; font-size:16px; }

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid #0070c9;
  background:#fff; color:#0070c9;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}

.calendar-btn:hover { background:#0070c9; color:white; }

.bell-dot {
  position:absolute; top:4px; right:4px;
  width:10px; height:10px;
  background:red; border-radius:50%;
  display:none;
}

.bell-dropdown {
  position:absolute;
  top:52px;
  right:0;
  width:280px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:10px;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
  display:none;
  flex-direction:column;
  z-index:3000;
  overflow:hidden;
}

.bell-dropdown div {
  padding:10px 12px;
  font-size:14px;
  border-bottom:1px solid #eee;
}

.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f1f1f1; }

/* ---------- PROFILE ---------- */
.profile-bubble {
  width:42px; height:42px;
  border-radius:50%;
  background:#0070c9;
  color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}

/* ---------- URGENCY ROWS ---------- */
.urgency-row { display:flex; gap:16px; margin:20px; padding:16px; background:#fff; border-radius:12px; border-left:6px solid; }
#red-row { border-color:red; }
#orange-row { border-color:orange; }
#yellow-row { border-color:gold; }
#green-row { border-color:green; }
.urgency-left { min-width:160px; }
.messages { display:flex; flex-wrap:wrap; gap:10px; }
.message-card { width:220px; padding:8px 10px; background:#f9f9f9; border:1px solid #ccc; border-radius:6px; font-size:14px; }

/* ---------- CALENDAR ---------- */
.calendar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; justify-content:center; align-items:center; z-index:4000; }
.calendar-box { background:white; padding:20px; width:420px; border-radius:14px; position:relative; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px; }
.calendar-day { background:#f1f1f1; border-radius:6px; padding:6px; cursor:pointer; text-align:center; }
.dot { width:8px; height:8px; border-radius:50%; margin:4px auto 0; }
.red { background:red; }
.orange { background:orange; }
.yellow { background:gold; }
.green { background:green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title">TapOut – Counselor Dashboard</div>
    <div class="header-right">

      <input id="searchBar" placeholder="Search students...">

      <button class="calendar-btn" onclick="openCalendar()">📅</button>

      <div style="position:relative;">
        <button class="calendar-btn" id="notifBell">
          🔔
          <span class="bell-dot" id="bellDot"></span>
        </button>
        <div class="bell-dropdown" id="bellDropdown"></div>
      </div>

      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>

    </div>
  </header>

  <div class="urgency-row" id="red-row"><div class="messages"></div></div>
  <div class="urgency-row" id="orange-row"><div class="messages"></div></div>
  <div class="urgency-row" id="yellow-row"><div class="messages"></div></div>
  <div class="urgency-row" id="green-row"><div class="messages"></div></div>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box">
    <h3 id="monthLabel"></h3>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
/* ---------- LOGIN ---------- */
const counselors = { miap2k10:"1234" };
loginForm.onsubmit = e => {
  e.preventDefault();
  if (counselors[username.value] === password.value) {
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent = username.value.slice(0,2).toUpperCase();
  checkNotifications();
}

function logout(){ localStorage.clear(); location.reload(); }

/* ---------- NOTIFICATIONS ---------- */
const bellDot = document.getElementById("bellDot");
const bellDropdown = document.getElementById("bellDropdown");
const notifBell = document.getElementById("notifBell");

function checkNotifications(){
  bellDropdown.innerHTML = "";
  bellDot.style.display = "block";

  const div = document.createElement("div");
  div.innerHTML = "<strong>Student in Crisis</strong><br>Needs immediate attention";
  bellDropdown.appendChild(div);
}

let bellOpen = false;

notifBell.addEventListener("click", e => {
  e.stopPropagation();
  bellOpen = !bellOpen;
  bellDropdown.style.display = bellOpen ? "flex" : "none";
  if (bellOpen) bellDot.style.display = "none";
});

document.addEventListener("click", () => {
  bellDropdown.style.display = "none";
  bellOpen = false;
});

/* ---------- CALENDAR ---------- */
function openCalendar(){
  calendarOverlay.style.display="flex";
}
</script>

</body>
</html>
