<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Counselor Dashboard</title>
  <link rel="stylesheet" href="style.css" /> <!-- KEEP YOUR ORIGINAL CSS -->
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
">
  <form id="loginForm" style="width:600px;">
    <div>
      <label style="font-size:20px;font-weight:bold;">Username</label>
      <input id="username" type="text" style="width:100%;height:40px;">
    </div>
    <br>
    <div>
      <label style="font-size:20px;font-weight:bold;">Password</label>
      <input id="password" type="password" style="width:100%;height:40px;">
    </div>
    <br>
    <a href="#" style="color:#0070c9;">Forgot Username or Password?</a>
    <br><br>
    <button type="submit" style="float:right;">Sign In</button>
  </form>
</div>

<!-- DASHBOARD (YOUR ORIGINAL LAYOUT GOES HERE) -->
<div id="dashboardScreen" style="display:none;">

  <!-- KEEP YOUR ORIGINAL HEADER -->
  <header class="main-header">
    <input id="searchBar" placeholder="Search students..." />
    <button onclick="logout()">Sign Out</button>
  </header>

  <!-- YOUR ORIGINAL FACE ROWS -->
  <div id="redRow" class="urgency-row"></div>
  <div id="orangeRow" class="urgency-row"></div>
  <div id="yellowRow" class="urgency-row"></div>
  <div id="greenRow" class="urgency-row"></div>

</div>

<script>
/* ACCOUNTS */
const counselors = {
  "miap2k10": "1234",
  "kmcconnell": "1234",
  "gsorbi": "1234",
  "apanlilio": "1234",
  "aturner": "1234",
  "cfilson": "1234"
};

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();

  const u = username.value.trim();
  const p = password.value.trim();

  if (counselors[u] === p) {
    localStorage.setItem("loggedInCounselor", u);
    showDashboard();
  } else {
    alert("Invalid login");
  }
});

/* SHOW DASHBOARD */
function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";
  loadMessages();
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

/* LOAD STUDENT DATA */
function loadMessages() {
  const counselor = localStorage.getItem("loggedInCounselor");
  const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");

  redRow.innerHTML = "";
  orangeRow.innerHTML = "";
  yellowRow.innerHTML = "";
  greenRow.innerHTML = "";

  messages.forEach(m => {
    if (m.counselor !== counselor) return;

    const card = document.createElement("div");
    card.className = "message-card";
    card.innerHTML = `
      <strong>${m.name} (Grade ${m.grade})</strong><br>
      ${m.reason}<br>
      <em>${m.urgency}</em><br>
      ${m.time}
    `;

    if (m.urgency === "I’m in Crisis") redRow.appendChild(card);
    else if (m.urgency === "I’m Not Coping Well") orangeRow.appendChild(card);
    else if (m.urgency === "Feeling a Little Off") yellowRow.appendChild(card);
    else greenRow.appendChild(card);
  });
}

/* AUTO LOGIN */
if (localStorage.getItem("loggedInCounselor")) {
  showDashboard();
}
</script>

</body>
</html>
