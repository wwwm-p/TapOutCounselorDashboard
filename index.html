<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Login & Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fffcf5;
      text-align: center;
    }

    /* LOGIN */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
      text-align: left;
    }

    .login-box label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
      font-size: 18px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      float: right;
      padding: 10px 25px;
      font-size: 16px;
      background: #0070c9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* DASHBOARD */
    #dashboardScreen {
      display: none;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #87CEFA;
      padding: 15px 30px;
    }

    .dashboard-header input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    .dashboard-header button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    .urgency-row {
      margin: 20px 0;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #fff;
      text-align: left;
    }

    .messages {
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .message-card {
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .message-time {
      font-size: 12px;
      color: #666;
    }

    .toggle-btn {
      margin-top: 10px;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #0070c9;
      color: white;
    }

    /* Urgency colors */
    #red-row { border-left: 6px solid red; }
    #orange-row { border-left: 6px solid orange; }
    #yellow-row { border-left: 6px solid gold; }
    #green-row { border-left: 6px solid green; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">

  <header class="dashboard-header">
    <input type="text" id="searchBar" placeholder="Search students...">
    <button onclick="logout()">Sign Out</button>
  </header>

  <div class="urgency-row" id="red-row">
    <h2>High Urgency</h2>
    <div class="messages hidden"></div>
    <button class="toggle-btn" onclick="toggleMessages('red-row')">Show Messages</button>
  </div>

  <div class="urgency-row" id="orange-row">
    <h2>Medium-High Urgency</h2>
    <div class="messages hidden"></div>
    <button class="toggle-btn" onclick="toggleMessages('orange-row')">Show Messages</button>
  </div>

  <div class="urgency-row" id="yellow-row">
    <h2>Medium-Low Urgency</h2>
    <div class="messages hidden"></div>
    <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Show Messages</button>
  </div>

  <div class="urgency-row" id="green-row">
    <h2>Low Urgency</h2>
    <div class="messages hidden"></div>
    <button class="toggle-btn" onclick="toggleMessages('green-row')">Show Messages</button>
  </div>

</div>

<script>
  const counselors = {
    "miap2k10": "1234",
    "kmcconnell": "1234",
    "gsorbi": "1234",
    "apanlilio": "1234",
    "aturner": "1234",
    "cfilson": "1234"
  };

  const loginScreen = document.getElementById("loginScreen");
  const dashboardScreen = document.getElementById("dashboardScreen");
  const loginForm = document.getElementById("loginForm");
  const searchBar = document.getElementById("searchBar");

  window.onload = () => {
    if (localStorage.getItem("loggedInCounselor")) showDashboard();
  };

  loginForm.addEventListener("submit", e => {
    e.preventDefault();
    const u = username.value.trim();
    const p = password.value.trim();

    if (counselors[u] === p) {
      localStorage.setItem("loggedInCounselor", u);
      showDashboard();
    } else {
      alert("Invalid login");
    }
  });

  function showDashboard() {
    loginScreen.style.display = "none";
    dashboardScreen.style.display = "block";
    loadMessages();
  }

  function logout() {
    localStorage.removeItem("loggedInCounselor");
    location.reload();
  }

  function toggleMessages(rowId) {
    const row = document.getElementById(rowId);
    const messages = row.querySelector(".messages");
    const btn = row.querySelector(".toggle-btn");

    messages.classList.toggle("hidden");
    btn.textContent = messages.classList.contains("hidden")
      ? "Show Messages"
      : "Hide Messages";
  }

  function loadMessages() {
    const counselor = localStorage.getItem("loggedInCounselor");
    const messages = JSON.parse(localStorage.getItem("studentMessages") || "[]");

    const map = {
      "I’m in Crisis": "red-row",
      "I’m Not Coping Well": "orange-row",
      "Feeling a Little Off": "yellow-row",
      "I’m Doing Fine – Just Curious": "green-row"
    };

    document.querySelectorAll(".messages").forEach(m => m.innerHTML = "");

    messages.forEach(msg => {
      if (msg.counselor !== counselor) return;

      const row = document.getElementById(map[msg.urgency] || "green-row");
      const box = row.querySelector(".messages");

      const card = document.createElement("div");
      card.className = "message-card";

      card.innerHTML = `
        <div class="message-header">
          <span>${msg.name} (Grade ${msg.grade})</span>
          <span class="message-time">${msg.time || ""}</span>
        </div>
        <div>Reason: ${msg.reason}</div>
        <div>Urgency: ${msg.urgency}</div>
      `;

      box.appendChild(card);
    });
  }

  searchBar.addEventListener("input", () => {
    const q = searchBar.value.toLowerCase();
    document.querySelectorAll(".message-card").forEach(c => {
      c.style.display = c.textContent.toLowerCase().includes(q) ? "block" : "none";
    });
  });
</script>

</body>
</html>
