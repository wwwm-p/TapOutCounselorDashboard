<style>

<body>
<!-- Install button -->
<button id="pwaInstallBtn" class="pill-btn primary pwa-install-btn" type="button">Install App</button>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-box">
    <h2>Counselor Login</h2>
    <label>Email</label>
    <input id="loginEmail" type="email" required placeholder="name@school.edu" />
    <label>Password</label>
    <input id="loginPassword" type="password" required placeholder="••••••••" />
    <div style="display:flex; justify-content:flex-end;">
      <button type="submit" class="pill-btn primary">Sign In</button>
    </div>
    <div style="margin-top:10px; font-size:12px; color:var(--muted);">
      Demo counselors: Alice Johnson, Bob Smith, Carlos Martinez
    </div>
  </form>
</div>

<!-- Main App -->
<div id="app" class="app" style="display:none;">
  <!-- Sidebar + Main content here (keep existing structure) -->
  <!-- ... existing HTML for sidebar, main, header, panels, modals ... -->
</div>

<script>
// --- Mock Data & Logic ---
/* ... your existing JS for login, students, notes, urgency, calendar ... */

// --- PWA Service Worker ---
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js")
      .then(reg => console.log("SW registered:", reg.scope))
      .catch(err => console.warn("SW registration failed:", err));
  });
}

// --- PWA Install Prompt ---
let deferredPrompt = null;
const pwaInstallBtn = document.getElementById("pwaInstallBtn");

function isRunningStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches
      || (navigator.standalone === true);
}

function setInstallBtnVisible(visible){
  pwaInstallBtn.style.display = visible ? "inline-flex" : "none";
}

// Hide install button if already installed
setInstallBtnVisible(!isRunningStandalone());

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setInstallBtnVisible(true);
});

window.addEventListener("appinstalled", () => {
  deferredPrompt = null;
  setInstallBtnVisible(false);
});

if (pwaInstallBtn) {
  pwaInstallBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    console.log("User choice:", choice.outcome);
    deferredPrompt = null;
    setInstallBtnVisible(false);
  });
}
</script>
</body>
</html>
