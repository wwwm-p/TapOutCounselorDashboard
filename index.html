<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffcf5;
}

/* ---------- LOGIN ---------- */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  width: 400px;
}

.login-box label {
  font-weight: bold;
  margin-top: 15px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-box button {
  margin-top: 25px;
  float: right;
  padding: 10px 25px;
  font-size: 16px;
  background: #0070c9;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ---------- DASHBOARD ---------- */
#dashboardScreen {
  display: none;
}

.dashboard-header {
  background: #87CEFA;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-title {
  font-size: 22px;
  font-weight: bold;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-right input {
  width: 260px;
  padding: 10px;
  font-size: 16px;
}

/* ---------- ICON BUTTONS ---------- */
.calendar-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid #0070c9;
  background: #fff;
  color: #0070c9;
  font-size: 18px;
  cursor: pointer;
}

.calendar-btn:hover {
  background: #0070c9;
  color: white;
}

.profile-bubble {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #0070c9;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  display: flex;
  gap: 16px;
  margin: 20px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.urgency-left {
  min-width: 160px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.message-card {
  width: 220px;
  padding: 8px 10px;
  font-size: 14px;
  background: #f9f9f9;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* ---------- TOGGLE ---------- */
.toggle-btn {
  padding: 6px 18px;
  border-radius: 20px;
  border: 2px solid #0070c9;
  background: #fff;
  color: #0070c9;
  cursor: pointer;
}

/* ---------- CALENDAR OVERLAY ---------- */
.calendar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.calendar-box {
  background: white;
  width: 460px;
  border-radius: 14px;
  padding: 16px;
  position: relative;
}

/* Close X */
.calendar-close {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
}

/* Calendar header */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.calendar-header button {
  border: none;
  background: none;
  font-size: 20px;
  cursor: pointer;
}

/* Days */
.calendar-days {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  font-weight: bold;
  text-align: center;
  margin-bottom: 6px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
}

.calendar-day {
  background: #f1f1f1;
  border-radius: 6px;
  padding: 6px;
  cursor: pointer;
  font-size: 13px;
  min-height: 46px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 4px;
}

.red { background: red; }
.orange { background: orange; }
.yellow { background: gold; }
.green { background: green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title">TapOut – Counselor Dashboard</div>
    <div class="header-right">
      <input id="searchBar" placeholder="Search students...">
      <button class="calendar-btn" onclick="openCalendar()">📅</button>
      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
    </div>
  </header>

  <div class="urgency-row" id="red-row"><div class="urgency-left"><strong>High Urgency</strong><button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button></div><div class="messages"></div></div>
  <div class="urgency-row" id="orange-row"><div class="urgency-left"><strong>Medium-High</strong><button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button></div><div class="messages"></div></div>
  <div class="urgency-row" id="yellow-row"><div class="urgency-left"><strong>Medium-Low</strong><button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button></div><div class="messages"></div></div>
  <div class="urgency-row" id="green-row"><div class="urgency-left"><strong>Low Urgency</strong><button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button></div><div class="messages"></div></div>
</div>

<!-- CALENDAR -->
<div class="calendar-overlay" id="calendarOverlay">
  <div class="calendar-box">
    <div class="calendar-close" onclick="closeCalendar()">✕</div>

    <div class="calendar-header">
      <button onclick="changeMonth(-1)">‹</button>
      <h3 id="monthLabel"></h3>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="calendar-days">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
const counselors={miap2k10:"1234",kmcconnell:"1234",gsorbi:"1234",apanlilio:"1234",aturner:"1234",cfilson:"1234"};
let currentDate=new Date();

loginForm.onsubmit=e=>{
  e.preventDefault();
  if(counselors[username.value]===password.value){
    localStorage.setItem("loggedInCounselor",username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard(){
  loginScreen.style.display="none";
  dashboardScreen.style.display="block";
  profileBubble.textContent=localStorage.getItem("loggedInCounselor").slice(0,2).toUpperCase();
}

function logout(){
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

/* ---------- CALENDAR ---------- */
function openCalendar(){
  calendarOverlay.style.display="flex";
  renderCalendar();
}
function closeCalendar(){
  calendarOverlay.style.display="none";
}

function changeMonth(dir){
  currentDate.setMonth(currentDate.getMonth()+dir);
  renderCalendar();
}

function renderCalendar(){
  calendarGrid.innerHTML="";
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();
  monthLabel.textContent=currentDate.toLocaleString("default",{month:"long",year:"numeric"});
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const appts=JSON.parse(localStorage.getItem("appointments")||"[]");

  for(let i=0;i<firstDay;i++) calendarGrid.appendChild(document.createElement("div"));

  for(let d=1;d<=daysInMonth;d++){
    const key=`${y}-${m}-${d}`;
    const cell=document.createElement("div");
    cell.className="calendar-day";
    cell.innerHTML=`<strong>${d}</strong>`;
    appts.filter(a=>a.date===key).forEach(a=>{
      const dot=document.createElement("div");
      dot.className=`dot ${a.urgency}`;
      cell.appendChild(dot);
    });
    cell.onclick=()=>addAppt(key);
    calendarGrid.appendChild(cell);
  }
}

function addAppt(date){
  const urgency=prompt("Urgency: red / orange / yellow / green");
  if(!urgency) return;
  const appts=JSON.parse(localStorage.getItem("appointments")||"[]");
  appts.push({date,urgency});
  localStorage.setItem("appointments",JSON.stringify(appts));
  renderCalendar();
}

function toggleMessages(id){
  const box=document.querySelector(`#${id} .messages`);
  box.style.display=box.style.display==="none"?"flex":"none";
}

window.onload=()=>{ if(localStorage.getItem("loggedInCounselor")) showDashboard(); };
</script>

</body>
</html>
