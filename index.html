<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TapOut! - Counselor Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- LOGIN SCREEN (CENTERED, DOES NOT AFFECT CSS) -->
<div id="loginScreen" style="
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
">
  <form id="loginForm" style="width:600px;">
    <div>
      <label style="font-size:20px;font-weight:bold;">Username</label>
      <input id="username" type="text" style="width:100%;height:40px;">
    </div>
    <br>
    <div>
      <label style="font-size:20px;font-weight:bold;">Password</label>
      <input id="password" type="password" style="width:100%;height:40px;">
    </div>
    <br>
    <a href="#" style="color:#0070c9;">Forgot Username or Password?</a>
    <br><br>
    <button type="submit" style="float:right;">Sign In</button>
  </form>
</div>

<!-- YOUR ORIGINAL DASHBOARD (UNCHANGED) -->
<header class="main-header">
  <h1>TapOut! - Counselor Dashboard</h1>

  <div class="header-center">
    <input type="text" id="studentSearchHeader" placeholder="Search students..." />
  </div>

  <div class="header-right">
    <button class="btn" onclick="openCalendar()">Open Calendar</button>
    <button class="btn" onclick="toggleStudentsPanel()">Students</button>
    <button class="btn" onclick="toggleNotesPanel()">Notes</button>
    <button class="btn" onclick="logout()">Sign Out</button>
  </div>
</header>

<div id="studentsPanel" class="students-panel hidden">
  <h2>Assigned Students</h2>
  <select id="sortOption">
    <option value="alpha">Alphabetical</option>
    <option value="grade">Grade Level</option>
  </select>
  <ul id="studentList"></ul>
</div>

<div id="notesPanel" class="notes-panel hidden">
  <h2>Notes</h2>
  <textarea id="newNote" style="width:100%;height:120px;"></textarea>
  <button class="btn" onclick="saveNote()">Save Note</button>
  <ul id="notesHistory"></ul>
</div>

<div id="studentDetailPanel" class="student-detail hidden">
  <button class="btn small-btn" onclick="closeStudentDetail()">Back</button>
  <h2 id="studentName"></h2>
  <p id="studentEmail"></p>
</div>

<!-- DASHBOARD ROWS -->
<div class="dashboard">
  <div id="redRow" class="urgency-row">
    <div class="face red-face"><div class="eyes"></div><div class="mouth"></div></div>
  </div>

  <div id="orangeRow" class="urgency-row">
    <div class="face orange-face"><div class="eyes"></div><div class="mouth"></div></div>
  </div>

  <div id="yellowRow" class="urgency-row">
    <div class="face yellow-face"><div class="eyes"></div><div class="mouth"></div></div>
  </div>

  <div id="greenRow" class="urgency-row">
    <div class="face green-face"><div class="eyes"></div><div class="mouth"></div></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
