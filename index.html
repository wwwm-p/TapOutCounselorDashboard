<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffcf5;
}

/* ---------- LOGIN ---------- */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,.1);
  width: 400px;
}

.login-box label {
  font-weight: bold;
  margin-top: 15px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-box button {
  margin-top: 25px;
  float: right;
  padding: 10px 25px;
  background: #0070c9;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display: none; }

.dashboard-header {
  background: #87CEFA;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-right input {
  width: 260px;
  padding: 10px;
}

/* ---------- ICON BUTTONS ---------- */
.calendar-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #0070c9;
  background: white;
  cursor: pointer;
  font-size: 18px;
}

.profile-bubble {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #0070c9;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  display: flex;
  gap: 16px;
  margin: 20px;
  padding: 16px;
  background: white;
  border-radius: 12px;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.messages {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.message-card {
  width: 220px;
  padding: 8px;
  background: #f9f9f9;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* ---------- CALENDAR MODAL (OG STYLE) ---------- */
#calendarModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.calendar-box {
  background: white;
  width: 360px;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 6px 14px rgba(0,0,0,.2);
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  margin-bottom: 10px;
}

.calendar-header button {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.calendar-day {
  height: 44px;
  background: #f1f1f1;
  border-radius: 6px;
  text-align: center;
  line-height: 44px;
  cursor: pointer;
  position: relative;
  font-size: 14px;
}

.calendar-day:hover {
  background: #e6e6e6;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
}

.red { background: red; }
.orange { background: orange; }
.yellow { background: gold; }
.green { background: green; }

.close-btn {
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button>Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div><strong>TapOut – Counselor Dashboard</strong></div>
    <div class="header-right">
      <input id="searchBar" placeholder="Search students...">
      <button class="calendar-btn" onclick="openCalendar()">📅</button>
      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
    </div>
  </header>

  <div class="urgency-row" id="red-row"><div class="messages"></div></div>
  <div class="urgency-row" id="orange-row"><div class="messages"></div></div>
  <div class="urgency-row" id="yellow-row"><div class="messages"></div></div>
  <div class="urgency-row" id="green-row"><div class="messages"></div></div>
</div>

<!-- CALENDAR -->
<div id="calendarModal">
  <div class="calendar-box">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
      <span class="close-btn" onclick="closeCalendar()">✕</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<script>
const counselors = { miap2k10:"1234", kmcconnell:"1234" };
let currentDate = new Date();

loginForm.onsubmit = e => {
  e.preventDefault();
  if (counselors[username.value] === password.value) {
    localStorage.setItem("loggedInCounselor", username.value);
    loginScreen.style.display = "none";
    dashboardScreen.style.display = "block";
    profileBubble.textContent = username.value.slice(0,2).toUpperCase();
  } else alert("Invalid login");
};

function logout() {
  localStorage.clear();
  location.reload();
}

/* ---------- CALENDAR LOGIC ---------- */
function openCalendar() {
  calendarModal.style.display = "flex";
  renderCalendar();
}
function closeCalendar() {
  calendarModal.style.display = "none";
}
function changeMonth(n) {
  currentDate.setMonth(currentDate.getMonth() + n);
  renderCalendar();
}

function renderCalendar() {
  calendarGrid.innerHTML = "";
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  monthLabel.textContent = currentDate.toLocaleString("default", { month:"long", year:"numeric" });

  const days = new Date(y, m + 1, 0).getDate();
  const data = JSON.parse(localStorage.getItem("appointments") || "[]");

  for (let d = 1; d <= days; d++) {
    const cell = document.createElement("div");
    cell.className = "calendar-day";
    cell.textContent = d;

    const found = data.find(a => a.date === `${y}-${m}-${d}`);
    if (found) {
      const dot = document.createElement("div");
      dot.className = "dot " + found.urgency;
      cell.appendChild(dot);
    }

    cell.onclick = () => addAppointment(y, m, d);
    calendarGrid.appendChild(cell);
  }
}

function addAppointment(y, m, d) {
  const urgency = prompt("Urgency: red / orange / yellow / green");
  if (!urgency) return;

  const data = JSON.parse(localStorage.getItem("appointments") || "[]");
  data.push({ date: `${y}-${m}-${d}`, urgency });
  localStorage.setItem("appointments", JSON.stringify(data));
  renderCalendar();
}
</script>

</body>
</html>
