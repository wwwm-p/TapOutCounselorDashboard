<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapOut! – Counselor Dashboard</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1>TapOut! – Counselor Dashboard</h1>
    </div>

    <div class="header-center">
      <input
        type="text"
        id="studentSearch"
        placeholder="Search students by name…"
      />
    </div>

    <div class="header-right">
      <button class="btn secondary" onclick="openCalendar()">Calendar</button>
      <button class="btn secondary" onclick="toggleStudents()">Students</button>
      <button class="btn secondary" onclick="toggleNotes()">Notes</button>
      <button class="btn primary">Sign In</button>
    </div>
  </header>

  <!-- STUDENTS PANEL -->
  <aside id="studentsPanel" class="panel hidden">
    <div class="panel-header">
      <h2>Assigned Students</h2>
      <select id="sortStudents" onchange="renderStudents()">
        <option value="alpha">A–Z</option>
        <option value="grade">Grade</option>
      </select>
    </div>
    <ul id="studentsList"></ul>
  </aside>

  <!-- NOTES PANEL -->
  <aside id="notesPanel" class="panel hidden">
    <h2>Quick Notes</h2>
    <textarea id="noteInput" placeholder="Write a note…"></textarea>
    <button class="btn primary full" onclick="saveNote()">Save</button>
    <ul id="notesList"></ul>
  </aside>

  <!-- STUDENT DETAIL -->
  <section id="studentDetail" class="detail hidden">
    <button class="btn text" onclick="closeStudent()">← Back</button>
    <h2 id="detailName"></h2>
    <p id="detailEmail"></p>

    <h3>Appointment History</h3>
    <p class="muted">No appointments recorded.</p>
  </section>

  <!-- DASHBOARD -->
  <main class="dashboard">
    <div class="urgency-row">
      <div class="face red-face"><div class="eyes"></div><div class="mouth"></div></div>
    </div>
    <div class="urgency-row">
      <div class="face orange-face"><div class="eyes"></div><div class="mouth"></div></div>
    </div>
    <div class="urgency-row">
      <div class="face yellow-face"><div class="eyes"></div><div class="mouth"></div></div>
    </div>
    <div class="urgency-row">
      <div class="face green-face"><div class="eyes"></div><div class="mouth"></div></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
