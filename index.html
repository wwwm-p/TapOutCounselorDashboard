<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut! – Counselor Dashboard</title>
<style>
body { margin:0; font-family:sans-serif; background:#fffcf5; }

/* ---------- LOGIN ---------- */
.login-wrapper { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:400px; }
.login-box label { font-weight:bold; margin-top:15px; display:block; }
.login-box input { width:100%; padding:10px; margin-top:6px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
.login-box button { margin-top:25px; float:right; padding:10px 25px; font-size:16px; background:#0070c9; color:white; border:none; border-radius:6px; cursor:pointer; }

/* ---------- DASHBOARD ---------- */
#dashboardScreen { display:none; }
.dashboard-header { background:#87CEFA; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.header-right { display:flex; align-items:center; gap:10px; }

/* ---------- SEARCH ---------- */
.search-wrap {
  display:flex;
  align-items:center;
  gap:8px;
  background:#ffffff;
  border:1px solid #e6e6e6;
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}
.search-icon { font-size:16px; opacity:0.7; }
.search-input {
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  width:220px;
}

/* ---------- BUTTONS ---------- */
.calendar-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid #0070c9;
  background:#fff; color:#0070c9;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.calendar-btn:hover { background:#0070c9; color:white; }

/* ---------- NOTIFICATIONS ---------- */
.notif-wrap { position:relative; }
.notif-btn {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #e6e6e6;
  background:#ffffff;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  cursor:pointer;
}
.notif-icon { font-size:16px; }
.notif-label { font-size:14px; font-weight:600; color:#2b2b2b; }
.notif-badge {
  width:8px; height:8px; border-radius:50%;
  background:#ff3b30; display:none;
  box-shadow:0 0 0 2px #fff;
}
.bell-dropdown {
  position:absolute;
  top:48px;
  right:0;
  background:#fff;
  border:1px solid #e6e6e6;
  border-radius:12px;
  width:280px;
  display:none;
  flex-direction:column;
  box-shadow:0 10px 24px rgba(0,0,0,0.15);
  z-index:1000;
  font-size:14px;
  overflow:hidden;
}
.bell-dropdown div {
  padding:12px 14px;
  border-bottom:1px solid #f0f0f0;
}
.bell-dropdown div:last-child { border-bottom:none; }
.bell-dropdown div:hover { background:#f7f7f7; }

/* ---------- PROFILE ---------- */
.profile-bubble {
  width:42px; height:42px; border-radius:50%;
  background:#0070c9; color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  display:flex; gap:16px; margin:20px; padding:16px;
  background:#fff; border-radius:12px; border-left:6px solid;
  align-items:flex-start;
}
#red-row { border-color:red; }
#orange-row { border-color:orange; }
#yellow-row { border-color:gold; }
#green-row { border-color:green; }

.urgency-left { min-width:160px; display:flex; flex-direction:column; gap:10px; flex:0 0 180px; }
.urgency-header { display:flex; align-items:center; gap:10px; }
.messages { display:flex; flex-wrap:wrap; gap:10px; flex:1; min-width:0; }
.message-card {
  width:220px; padding:8px 10px; font-size:14px;
  background:#f9f9f9; border:1px solid #ccc; border-radius:6px; line-height:1.3;
}
.message-meta { font-size:12px; color:#555; margin-top:4px; }

/* ---------- FACE STYLE ---------- */
.face {
  width:44px;
  height:44px;
  border-radius:50%;
  position:relative;
  flex:0 0 44px;
}
.eye {
  width:6px;
  height:6px;
  background:#3b3b3b;
  border-radius:50%;
  position:absolute;
  top:14px;
}
.eye.left { left:13px; }
.eye.right { right:13px; }

.mouth {
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  width:22px;
  height:12px;
  border:4px solid #3b3b3b;
  border-color:#3b3b3b transparent transparent transparent;
  border-radius:50%;
}
.sad .mouth { transform:translateX(-50%) rotate(180deg); }
.neutral .mouth {
  border:none;
  width:24px;
  height:4px;
  background:#3b3b3b;
  border-radius:6px;
}
.green-face .mouth {
  border-color:transparent transparent #3b3b3b transparent;
  height:12px;
}

/* Orange face frown (lower) */
.orange-face.sad .mouth {
  width:18px;
  height:9px;
  border:3px solid #3b3b3b;
  border-color:#3b3b3b transparent transparent transparent;
  border-radius:50%;
  transform:translateX(-50%);
  bottom:4px;
}

/* ✅ Red face frown (more pronounced + filled) */
.red-face.sad .mouth {
  width:24px;
  height:13px;
  border:4px solid #3b3b3b;
  border-color:#3b3b3b transparent transparent transparent;
  border-radius:50%;
  transform:translateX(-50%);
  bottom:4px;
  background:#3b3b3b;
}

.red-face { background:#ff5a4e; }
.orange-face { background:#ffb02e; }
.yellow-face { background:#ffe31a; }
.green-face { background:#a9cf4f; }

toggle-btn { padding:6px 18px; border-radius:20px; border:2px solid #0070c9; background:#fff; color:#0070c9; cursor:pointer; }

/* ---------- CALENDAR ---------- */
.calendar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; justify-content:center; align-items:center; z-index:2000; }
.calendar-box { background:white; padding:20px; width:420px; border-radius:14px; position:relative; }
.calendar-header { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.calendar-header h3 { margin:0; text-align:center; flex:1; }
.close-calendar { position:absolute; top:6px; right:10px; cursor:pointer; font-size:18px; }
.month-nav { width:34px; height:34px; border-radius:50%; border:2px solid #0070c9; background:#fff; color:#0070c9; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.month-nav:hover { background:#0070c9; color:white; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px; }
.calendar-day { background:#f1f1f1; border-radius:6px; padding:6px; cursor:pointer; font-size:13px; display:flex; flex-direction:column; align-items:center; min-height:48px; }
.calendar-weekday { font-weight:bold; text-align:center; font-size:12px; color:#444; }
.calendar-empty { background:transparent; cursor:default; }
.dot { width:8px; height:8px; border-radius:50%; margin-top:4px; }
.red { background:red; }
.orange { background:orange; }
yellow { background:gold; }
green { background:green; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <header class="dashboard-header">
    <div class="dashboard-title" style="display:flex; align-items:center; gap:12px; font-size:20px;">
      <div style="width:34px; height:34px; border-radius:8px; background:#ffffff; border:2px solid #0070c9; display:flex; align-items:center; justify-content:center; font-weight:700; color:#0070c9;">
        LOGO
      </div>
      <div style="display:flex; flex-direction:column; line-height:1.1;">
        <div>
          <span style="font-weight:700; color:#0f172a;">TapOut!</span>
          <span style="color:#94a3b8; font-weight:600;">—</span>
          <span style="font-weight:500; color:#334155;">Counselor Dashboard</span>
        </div>
        <span style="font-size:11px; color:#64748b; margin-top:2px;">Your School Name Here</span>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchBar" class="search-input" placeholder="Search students..." />
      </div>

      <div style="width:34px; height:34px; border-radius:50%; background:#ffffff; border:2px solid #0070c9; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#0070c9;">
        SCHOOL
      </div>

      <button style="padding:8px 16px; border-radius:999px; border:1px solid #e6e6e6; background:#ffffff; box-shadow:0 4px 14px rgba(0,0,0,0.06); cursor:pointer; font-size:14px; font-weight:600; color:#2b2b2b;">
        Students
      </button>

      <button class="calendar-btn" onclick="openCalendar()">📅</button>

      <div class="notif-wrap">
        <button class="notif-btn" id="notifBell">
          <span class="notif-icon">🔔</span>
          <span class="notif-label">Alerts</span>
          <span class="notif-badge" id="bellDot"></span>
        </button>
        <div class="bell-dropdown" id="bellDropdown"></div>
      </div>

      <div class="profile-bubble" id="profileBubble" onclick="logout()"></div>
    </div>
  </header>

  <!-- URGENCY ROWS -->
  <div class="urgency-row" id="red-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face red-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>High Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('red-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="orange-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face orange-face sad">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-High</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('orange-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="yellow-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face yellow-face neutral">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Medium-Low</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('yellow-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>

  <div class="urgency-row" id="green-row">
    <div class="urgency-left">
      <div class="urgency-header">
        <div class="face green-face">
          <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
        </div>
        <h2>Low Urgency</h2>
      </div>
      <button class="toggle-btn" onclick="toggleMessages('green-row')">Hide Messages</button>
    </div>
    <div class="messages"></div>
  </div>
</div>
</body>
</html>
