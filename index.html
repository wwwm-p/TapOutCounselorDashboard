<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapOut – Counselor Dashboard</title>

<style>
:root {
  --bg: #fffcf5;
  --card: #ffffff;
  --text: #000;
  --header: #87CEFA;
  --accent: #0070c9;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2a2a2a;
  --text: #fff;
  --header: #333;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ---------- LOGIN ---------- */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: var(--card);
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  width: 400px;
}

.login-box label {
  font-weight: bold;
  margin-top: 15px;
  display: block;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-box button {
  margin-top: 25px;
  float: right;
  padding: 10px 25px;
  font-size: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ---------- HEADER ---------- */
.dashboard-header {
  background: var(--header);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-title {
  font-size: 22px;
  font-weight: bold;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-right input {
  width: 260px;
  padding: 10px;
  font-size: 16px;
}

/* ---------- PROFILE ---------- */
.profile-wrapper {
  position: relative;
}

.profile-bubble {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  position: relative;
}

.profile-bubble:hover::after {
  content: attr(data-name);
  position: absolute;
  top: 50px;
  right: 0;
  background: #000;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
}

/* ---------- DROPDOWN ---------- */
.profile-menu {
  position: absolute;
  right: 0;
  top: 55px;
  background: var(--card);
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  width: 200px;
  display: none;
  overflow: hidden;
  animation: fadeIn 0.2s ease;
}

.profile-menu button,
.profile-menu label {
  width: 100%;
  padding: 12px 14px;
  background: none;
  border: none;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}

.profile-menu button:hover,
.profile-menu label:hover {
  background: rgba(0,0,0,0.05);
}

.profile-menu label {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- LOGOUT MODAL ---------- */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: var(--card);
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-box button {
  margin: 10px;
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.confirm { background: #d9534f; color: white; }
.cancel { background: #ccc; }

/* ---------- URGENCY ROWS ---------- */
.urgency-row {
  margin: 20px;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  border-left: 6px solid;
}

#red-row { border-color: red; }
#orange-row { border-color: orange; }
#yellow-row { border-color: gold; }
#green-row { border-color: green; }

.messages {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.message-card {
  width: 220px;
  padding: 8px 10px;
  font-size: 14px;
  background: var(--bg);
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* ---------- FACES ---------- */
.face {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  position: relative;
}

.eye {
  width: 5px;
  height: 5px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 11px;
}

.eye.left { left: 10px; }
.eye.right { right: 10px; }

.mouth {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 16px;
  height: 8px;
  border: 3px solid black;
  border-color: black transparent transparent transparent;
  border-radius: 50%;
}

.sad .mouth { transform: translateX(-50%) rotate(180deg); }
.neutral .mouth { border: none; height: 3px; background: black; }

.red-face { background: red; }
.orange-face { background: orange; }
.yellow-face { background: gold; }
.green-face { background: green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <form id="loginForm" class="login-box">
    <label>Username</label>
    <input id="username" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none">
  <header class="dashboard-header">
    <div class="dashboard-title">TapOut – Counselor Dashboard</div>
    <div class="header-right">
      <input id="searchBar" placeholder="Search students...">

      <div class="profile-wrapper">
        <div class="profile-bubble" id="profileBubble"></div>
        <div class="profile-menu" id="profileMenu">
          <label>
            Dark Mode
            <input type="checkbox" onchange="toggleDarkMode(this)">
          </label>
          <button onclick="openLogout()">Sign Out</button>
        </div>
      </div>
    </div>
  </header>
</div>

<!-- LOGOUT MODAL -->
<div class="modal" id="logoutModal">
  <div class="modal-box">
    <h3>Sign out?</h3>
    <p>You will be logged out.</p>
    <button class="confirm" onclick="logout()">Sign Out</button>
    <button class="cancel" onclick="closeLogout()">Cancel</button>
  </div>
</div>

<script>
const counselors = {
  miap2k10: "1234",
  kmcconnell: "1234",
  gsorbi: "1234",
  apanlilio: "1234",
  aturner: "1234",
  cfilson: "1234"
};

loginForm.onsubmit = e => {
  e.preventDefault();
  if (counselors[username.value] === password.value) {
    localStorage.setItem("loggedInCounselor", username.value);
    showDashboard();
  } else alert("Invalid login");
};

function showDashboard() {
  loginScreen.style.display = "none";
  dashboardScreen.style.display = "block";

  const name = localStorage.getItem("loggedInCounselor");
  const initials = name.slice(0,2).toUpperCase();
  profileBubble.textContent = initials;
  profileBubble.dataset.name = name;
}

profileBubble.onclick = () => {
  profileMenu.style.display =
    profileMenu.style.display === "block" ? "none" : "block";
};

function toggleDarkMode(cb) {
  document.body.classList.toggle("dark", cb.checked);
}

function openLogout() {
  profileMenu.style.display = "none";
  logoutModal.style.display = "flex";
}

function closeLogout() {
  logoutModal.style.display = "none";
}

function logout() {
  localStorage.removeItem("loggedInCounselor");
  location.reload();
}

window.onclick = e => {
  if (!e.target.closest(".profile-wrapper")) profileMenu.style.display = "none";
};

window.onload = () => {
  if (localStorage.getItem("loggedInCounselor")) showDashboard();
};
</script>

</body>
</html>
