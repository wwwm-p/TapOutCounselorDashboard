<!DOCTYPE html>
<html lang="en">
<head>

  <title>Counselor Dashboard</title>

</head>

<body>

<header class="main-header">
  <h1>TapOut! Counselor Dashboard</h1>

  <input id="searchBar" placeholder="Search students..." oninput="loadRequests()">

    <button onclick="toggleNotes()">Notes</button>
    <button>Sign Out</button>
  </div>
</header>

<div class="dashboard">

  <div class="urgency-row" id="Red">
    <h2>🔴 Crisis</h2>
    <ul></ul>
  </div>

  <div class="urgency-row" id="Orange">
    <h2>🟠 Coping</h2>
    <ul></ul>
  </div>

  <div class="urgency-row" id="Yellow">
    <h2>🟡 Little Off</h2>
    <ul></ul>
  </div>

  <div class="urgency-row" id="Green">
    <h2>🟢 Fine</h2>
    <ul></ul>
  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
