<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SIS Counselor Dashboard</title>

<link rel="manifest" href="counselor-manifest.json" />
<meta name="theme-color" content="#0070c9" />

<style>
:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --muted:#64748b;
  --text:#0f172a;
  --accent-dark:#0070c9;
  --border:#e5e7eb;
}
body{ margin:0; font-family:system-ui; background:var(--bg); }
.app{ display:grid; grid-template-columns:260px 1fr; min-height:100vh; }
.sidebar{ padding:20px; border-right:1px solid var(--border); background:white;}
.main{ display:flex; flex-direction:column; }
.header{ padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;}
.content{ padding:20px; }
.panel{ background:white; padding:16px; border-radius:12px; border:1px solid var(--border); }

.login-screen{ display:flex; justify-content:center; align-items:center; height:100vh;}
.login-box{ background:white; padding:20px; border-radius:12px; width:300px; }

.pill-btn{ padding:8px 12px; border-radius:20px; border:1px solid var(--border); cursor:pointer;}
.primary{ background:#0070c9; color:white; }

.pwa-install-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  display:none;
}
</style>
</head>

<body>

<button id="installBtn" class="pill-btn primary pwa-install-btn">Install App</button>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-box">
    <h2>Login</h2>
    <input id="email" placeholder="email" required><br><br>
    <input id="password" type="password" placeholder="password" required><br><br>
    <button class="pill-btn primary">Sign In</button>
  </form>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">
  <aside class="sidebar">
    <h3>Dashboard</h3>
    <button data-view="home">Home</button>
    <button data-view="students">Students</button>
  </aside>

  <div class="main">
    <div class="header">
      <div id="schoolName">School</div>
      <button id="logout">Logout</button>
    </div>

    <div class="content">
      <div id="homeView" class="panel view">Home Content</div>
      <div id="studentsView" class="panel view" style="display:none;">Students Content</div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

/* ---------- DATA ---------- */
const users = [
  {email:"alice@school.edu", password:"alice123"},
  {email:"bob@school.edu", password:"bob123"}
];

/* ---------- ELEMENTS ---------- */
const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");
const form = document.getElementById("loginForm");

/* ---------- LOGIN ---------- */
form.addEventListener("submit", (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const valid = users.find(u => u.email===email && u.password===password);

  if(!valid){
    alert("Invalid login");
    return;
  }

  loginScreen.style.display = "none";
  app.style.display = "grid";
});

/* ---------- NAV ---------- */
document.querySelectorAll("[data-view]").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".view").forEach(v=>v.style.display="none");
    document.getElementById(btn.dataset.view+"View").style.display="block";
  };
});

/* ---------- LOGOUT ---------- */
document.getElementById("logout").onclick = ()=>{
  location.reload();
};

/* ---------- PWA INSTALL ---------- */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.onclick = async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
  installBtn.style.display = "none";
};

});
</script>

</body>
</html>
