<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIS Counselor Dashboard</title>

<link rel="manifest" href="counselor-manifest.json">

<meta name="theme-color" content="#0070c9" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="apple-touch-icon" href="icons/icon-192-counselor.png" />
<link rel="icon" href="icons/icon-192-counselor.png" />

<style>
/* KEEPING YOUR ORIGINAL STYLES EXACT */
body{margin:0;font-family:system-ui;background:#f7f6f2;}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
.sidebar{background:#fff;padding:20px;border-right:1px solid #ddd;}
.main{display:flex;flex-direction:column;}
.header{padding:16px;background:#fff;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;}
.content{padding:20px;}
.pill-btn{padding:6px 12px;border-radius:20px;border:1px solid #ccc;cursor:pointer;}
.primary{background:#0070c9;color:#fff;border:none;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;}
.modal{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:900px;}

.pwa-install-btn{
position:fixed;
bottom:20px;
right:20px;
display:none;
}
</style>
</head>

<body>

<button id="installBtn" class="pill-btn primary pwa-install-btn">Install App</button>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Login</h2>
  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="login()" class="pill-btn primary">Login</button>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">
  <div class="sidebar">
    <button onclick="openUrgency()">Urgency</button>
  </div>

  <div class="main">
    <div class="header">Dashboard</div>
    <div class="content">
      <div id="urgencyGrid"></div>
    </div>
  </div>
</div>

<!-- URGENCY -->
<div id="urgencyOverlay" class="overlay">
  <div class="modal">
    <h2>Urgency</h2>
    <div id="urgencyList"></div>
    <button onclick="closeUrgency()">Close</button>
  </div>
</div>

<script>
/* ---------- DATA ---------- */
const users = [
  {email:"alice@school.edu", password:"alice123"},
  {email:"bob@school.edu", password:"bob123"}
];

const messages = [
  {name:"Maya", level:"high", text:"Crisis"},
  {name:"Noah", level:"med", text:"Stressed"},
  {name:"Olivia", level:"low", text:"Check in"}
];

/* ---------- LOGIN FIX ---------- */
function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const user = users.find(u => u.email===email && u.password===password);

  if(!user){
    alert("Invalid login");
    return;
  }

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="grid";

  renderUrgency();
}

/* ---------- URGENCY FIX ---------- */
function renderUrgency(){
  const grid = document.getElementById("urgencyGrid");
  grid.innerHTML="";

  messages.forEach(m=>{
    const div=document.createElement("div");
    div.innerHTML = `<b>${m.name}</b>: ${m.text}`;
    grid.appendChild(div);
  });
}

function openUrgency(){
  const list = document.getElementById("urgencyList");
  list.innerHTML="";

  messages.forEach(m=>{
    const div=document.createElement("div");
    div.innerHTML = `<b>${m.name}</b> (${m.level}) - ${m.text}`;
    list.appendChild(div);
  });

  document.getElementById("urgencyOverlay").style.display="flex";
}

function closeUrgency(){
  document.getElementById("urgencyOverlay").style.display="none";
}

/* ---------- SERVICE WORKER ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("service-worker.js");
  });
}

/* ---------- INSTALL BUTTON FIX ---------- */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

/* SHOW BUTTON EVEN IF EVENT FAILS */
setTimeout(()=>{
  if(!deferredPrompt){
    installBtn.style.display="block"; // fallback
  }
},3000);

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display="block";
});

installBtn.onclick = async ()=>{
  if(!deferredPrompt){
    alert("Use browser menu → Add to Home Screen");
    return;
  }

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  installBtn.style.display="none";
};
</script>

</body>
</html>
